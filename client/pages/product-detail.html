<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Product - ShopFlow</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body{background:#f8fafc;}
    .page{max-width:960px;margin:0 auto;padding:2rem 1.5rem 4rem;}
    .back-link{display:inline-flex;align-items:center;gap:.4rem;color:#2563eb;text-decoration:none;font-size:.9rem;font-weight:500;margin-bottom:1.25rem;}
    .product-layout{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:2.5rem;}
    .media-section{}
    .main-img{width:100%;border-radius:14px;object-fit:cover;height:320px;background:#e2e8f0;cursor:zoom-in;}
    .thumb-row{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap;}
    .thumb{width:70px;height:70px;border-radius:8px;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:border .2s;}
    .thumb.active,.thumb:hover{border-color:#2563eb;}
    .info-section{}
    .product-title{font-size:1.5rem;font-weight:700;color:#1e293b;margin-bottom:.4rem;}
    .seller-link{font-size:.85rem;color:#2563eb;text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:.3rem;margin-bottom:.75rem;}
    .product-price{font-size:2rem;font-weight:800;color:#2563eb;margin-bottom:.5rem;}
    .rating-row{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;}
    .stars{color:#f59e0b;font-size:1rem;}
    .badge{display:inline-block;padding:.25rem .75rem;border-radius:999px;font-size:.75rem;font-weight:600;}
    .badge-green{background:#dcfce7;color:#16a34a;}
    .badge-orange{background:#fff7ed;color:#ea580c;}
    .badge-gray{background:#f1f5f9;color:#64748b;}
    .divider{height:1px;background:#e2e8f0;margin:1.25rem 0;}
    .spec-table{width:100%;border-collapse:collapse;font-size:.875rem;}
    .spec-table tr:nth-child(even){background:#f8fafc;}
    .spec-table td{padding:.6rem .75rem;color:#374151;}
    .spec-table td:first-child{font-weight:600;color:#1e293b;width:40%;}
    .section-title{font-size:1.05rem;font-weight:700;color:#1e293b;margin-bottom:.75rem;}
    .condition-box{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:1rem 1.25rem;font-size:.875rem;color:#92400e;margin-bottom:1rem;}
    .btn-cart{width:100%;padding:.9rem;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:1rem;transition:background .2s;}
    .btn-cart:hover{background:#1d4ed8;}
    .btn-wishlist{width:100%;padding:.75rem;background:#f1f5f9;color:#1e293b;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:.5rem;}
    .reviews-section{margin-top:2rem;}
    .review-card{background:#fff;border-radius:12px;padding:1.25rem;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:1rem;}
    .review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;}
    .reviewer{font-weight:600;color:#1e293b;font-size:.9rem;}
    .review-date{font-size:.75rem;color:#94a3b8;}
    .review-comment{font-size:.875rem;color:#374151;line-height:1.5;margin-top:.4rem;}
    .img-zoom{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;cursor:zoom-out;}
    .img-zoom.open{display:flex;}
    .img-zoom img{max-width:90vw;max-height:90vh;border-radius:12px;}
    @media(max-width:640px){.product-layout{grid-template-columns:1fr;}.main-img{height:240px;}}
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <div style="position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 8px rgba(0,0,0,.06);">
    <div style="display:flex;align-items:center;gap:1rem;padding:0 1rem;height:64px;max-width:1200px;margin:0 auto;width:100%;overflow:hidden;">
      <button id="hamburger" onclick="toggleDrawer()" style="display:flex;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:.4rem;">
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
      </button>
      <a href="../index.html" style="font-family:Georgia,serif;font-size:clamp(1rem,4vw,1.6rem);font-weight:900;color:#2563eb;text-decoration:none;letter-spacing:-.5px;">ShopFlow</a>
      <div style="display:flex;align-items:center;gap:.75rem;margin-left:auto;">
        <button onclick="window.location.href='cart.html'" style="position:relative;background:none;border:none;cursor:pointer;color:#6b7280;padding:.4rem;display:flex;align-items:center;">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span id="cart-count" style="display:none;position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;font-size:.65rem;font-weight:800;min-width:18px;height:18px;border-radius:999px;align-items:center;justify-content:center;border:2px solid #fff;padding:0 3px;">0</span>
        </button>
        <a id="nav-auth-btn" href="login.html" style="background:#2563eb;color:#fff;padding:.45rem .75rem;border-radius:8px;font-size:.8rem;font-weight:600;text-decoration:none;white-space:nowrap;">Get Started</a>
      </div>
    </div>
  </div>

  <!-- Drawer -->
  <div id="drawer-overlay" onclick="toggleDrawer()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:180;"></div>
  <nav id="nav-drawer" style="position:fixed;top:64px;left:0;bottom:0;width:280px;background:#fff;border-right:1px solid #e5e7eb;box-shadow:4px 0 20px rgba(0,0,0,.1);transform:translateX(-100%);transition:transform .3s ease;z-index:190;padding:1.5rem;display:flex;flex-direction:column;gap:.5rem;">
    <a href="../index.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">🏠 Home</a>
    <a href="products.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">🛍 Products</a>
    <a href="purchases.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">📦 My Orders</a>
    <a href="profile.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">👤 Profile</a>
    <a href="dashboard.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">📊 Dashboard</a>
    <div style="height:1px;background:#e5e7eb;margin:.5rem 0;"></div>
    <a id="drawer-login-link" href="login.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">🔑 Login</a>
    <a id="drawer-cta-btn" href="register.html" style="display:block;text-align:center;background:#2563eb;color:#fff;padding:.8rem;border-radius:10px;font-weight:600;text-decoration:none;margin-top:auto;">Create Account</a>
  </nav>

  <div class="page">
    <a href="../index.html" class="back-link">← Back to Products</a>
    <div id="product-container"><p class="loading" style="text-align:center;padding:3rem;">Loading product...</p></div>
  </div>

  <!-- Image Zoom -->
  <div class="img-zoom" id="img-zoom" onclick="closeZoom()">
    <img id="zoom-img" src="" alt="zoom"/>
  </div>

  <script src="../js/api.js"></script>
  <script>
    var productId = new URLSearchParams(location.search).get('id');
    if (!productId) window.location.href = '../index.html';

    var PLACEHOLDER = 'https://placehold.co/800x600/e2e8f0/94a3b8?text=No+Image';

    // Fake extra images per product category
    var fakeImages = {
      'Laptops': [
        'https://images.unsplash.com/photo-1541807084-5c52b6b3adef?w=400&h=300&fit=crop',
        'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400&h=300&fit=crop',
        'https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2?w=400&h=300&fit=crop'
      ],
      'Phones': [
        'https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=400&h=300&fit=crop',
        'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400&h=300&fit=crop',
        'https://images.unsplash.com/photo-1580910051074-3eb694886505?w=400&h=300&fit=crop'
      ],
      'Audio': [
        'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=300&fit=crop',
        'https://images.unsplash.com/photo-1545127398-14699f92334b?w=400&h=300&fit=crop',
        'https://images.unsplash.com/photo-1484704849700-f032a568e944?w=400&h=300&fit=crop'
      ],
      'default': [
        'https://images.unsplash.com/photo-1560343090-f0409e92791a?w=400&h=300&fit=crop',
        'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop'
      ]
    };

    // Fake specs per product
    var fakeSpecs = {
      1: { // MacBook Pro 14"
        'Processor': 'Apple M3 Pro (11-core CPU, 14-core GPU)',
        'Memory': '16GB Unified RAM',
        'Storage': '512GB NVMe SSD',
        'Display': '14.2" Liquid Retina XDR, 3024x1964, 120Hz ProMotion',
        'Battery': 'Up to 18 hours, 70Wh',
        'Ports': '3x Thunderbolt 4, HDMI, SD Card, MagSafe 3',
        'Weight': '1.55 kg (3.5 lbs)',
        'OS': 'macOS Sonoma 14',
        'Condition': 'New — Sealed in original box',
        'Warranty': '1 Year Apple Limited Warranty'
      },
      2: { // iPhone 15 Pro
        'Chip': 'Apple A17 Pro (3nm)',
        'Display': '6.1" Super Retina XDR OLED, 2556x1179, 120Hz',
        'Main Camera': '48MP Fusion, 12MP Ultra Wide, 12MP 3x Telephoto',
        'Front Camera': '12MP TrueDepth with autofocus',
        'Battery': 'Up to 23 hours video playback',
        'Storage': '256GB',
        'Build': 'Grade 5 Titanium frame, Ceramic Shield front',
        'Connectivity': '5G, Wi-Fi 6E, Bluetooth 5.3, USB-C (USB 3)',
        'Condition': 'New — Unlocked, all carriers',
        'Warranty': '1 Year Apple Limited Warranty'
      },
      3: { // Sony WH-1000XM5
        'Driver': '30mm, dome type',
        'Frequency Response': '4Hz – 40,000Hz',
        'Noise Cancellation': 'Industry-leading ANC with 8 microphones',
        'Battery Life': 'Up to 30 hours (ANC on), 40 hours (ANC off)',
        'Charge Time': '3.5 hours (USB-C), 3 min = 3 hours',
        'Bluetooth': '5.2, multipoint connection (2 devices)',
        'Codecs': 'SBC, AAC, LDAC',
        'Weight': '250g',
        'Condition': 'New — Retail box with all accessories',
        'Warranty': '1 Year Sony Warranty'
      },
      4: { // Classic Chino
        'Material': '98% Cotton, 2% Elastane',
        'Fit': 'Slim tapered fit',
        'Rise': 'Mid rise',
        'Closure': 'Zip fly with button',
        'Pockets': '4-pocket styling',
        'Care': 'Machine wash cold, tumble dry low',
        'Available Sizes': 'XS, S, M, L, XL, XXL',
        'Available Colors': 'Khaki, Navy, Olive, Stone',
        'Condition': 'New with tags',
        'Made In': 'Portugal'
      },
      7: { // MacBook 2019
        'Processor': 'Intel Core i7-9750H (6-core, 2.6GHz, Turbo 4.5GHz)',
        'Memory': '32GB DDR4 2666MHz',
        'Storage': '2TB NVMe SSD (upgraded)',
        'Display': '15.4" Retina IPS, 2880x1800, True Tone',
        'GPU': 'AMD Radeon Pro 555X 4GB + Intel UHD 630',
        'Battery': 'New replacement battery — up to 10 hours',
        'Ports': '4x Thunderbolt 3 (USB-C), Headphone jack',
        'Weight': '1.83 kg (4.02 lbs)',
        'OS': 'macOS Ventura 13.6',
        'Condition': 'Refurbished — Grade A, minor cosmetic wear'
      },
      5: { // The Pragmatic Programmer
        'Authors': 'David Thomas, Andrew Hunt',
        'Edition': '20th Anniversary Edition (2nd Ed.)',
        'Publisher': 'Addison-Wesley Professional',
        'Pages': '352',
        'Language': 'English',
        'ISBN-13': '978-0135957059',
        'Format': 'Paperback',
        'Published': 'September 2019',
        'Condition': 'New — Ships same day',
        'Genre': 'Software Engineering / Career'
      }
    };

    var fakeConditions = {
      1: 'This MacBook Pro 14" is brand new, sealed in original Apple packaging. Includes MagSafe 3 charging cable, USB-C to MagSafe 3 Cable, and documentation. AppleCare+ eligible.',
      2: 'Factory unlocked iPhone 15 Pro. Works with all major carriers. Includes USB-C cable and documentation. No scratches, no dents.',
      3: 'Brand new Sony WH-1000XM5 in retail packaging. Includes carrying case, USB-C charging cable, 3.5mm audio cable, and airplane adapter.',
      4: 'New with tags. Shipped in branded packaging. Size guide available on request.',
      7: 'Professionally refurbished MacBook Pro 2019. New battery (cycle count < 10), upgraded 2TB SSD, 32GB RAM. Thoroughly tested — passes all Apple diagnostics. Minor cosmetic wear on bottom case. Includes charger, box, and 90-day seller warranty.',
      5: 'New paperback, ships within 24 hours. Includes free bookmarks while supplies last.'
    };

    function toggleDrawer() {
      var drawer = document.getElementById('nav-drawer');
      var overlay = document.getElementById('drawer-overlay');
      var open = drawer.style.transform === 'translateX(0px)' || drawer.style.transform === 'translateX(0)';
      drawer.style.transform = open ? 'translateX(-100%)' : 'translateX(0)';
      overlay.style.display = open ? 'none' : 'block';
    }

    function openZoom(src) {
      document.getElementById('zoom-img').src = src;
      document.getElementById('img-zoom').classList.add('open');
    }
    function closeZoom() { document.getElementById('img-zoom').classList.remove('open'); }

    function setMainImg(src) {
      document.getElementById('main-img').src = src;
      document.querySelectorAll('.thumb').forEach(function(t) {
        t.classList.toggle('active', t.src === src || t.dataset.src === src);
      });
    }

    function starsHtml(rating, count) {
      if (!rating) return '<span style="color:#94a3b8;font-size:.85rem;">No reviews yet</span>';
      var s = '';
      for (var i = 1; i <= 5; i++) s += i <= Math.round(rating) ? '★' : '☆';
      return '<span class="stars">' + s + '</span><span style="font-size:.85rem;color:#64748b;"> ' + rating + ' (' + (count||0) + ' reviews)</span>';
    }

    async function init() {
      // Auth
      var token = localStorage.getItem('sf_token');
      var btn = document.getElementById('nav-auth-btn');
      var drawerLogin = document.getElementById('drawer-login-link');
      var drawerCta = document.getElementById('drawer-cta-btn');
      if (token) {
        var user = JSON.parse(localStorage.getItem('sf_user') || '{}');
        btn.textContent = user.name ? user.name.split(' ')[0] : 'Account';
        btn.href = 'dashboard.html'; btn.style.background='transparent'; btn.style.color='#2563eb'; btn.style.border='2px solid #2563eb';
        if (drawerLogin) drawerLogin.style.display='none';
        if (drawerCta) { drawerCta.textContent='Logout'; drawerCta.removeAttribute('href'); drawerCta.style.background='#dc2626'; drawerCta.onclick=function(){localStorage.removeItem('sf_token');localStorage.removeItem('sf_user');window.location.href='login.html';}; }
        var badge = document.getElementById('cart-count');
        var guestCount = JSON.parse(localStorage.getItem('guest_cart')||'[]').reduce(function(s,i){return s+(i.quantity||1);},0);
        try { var r=await fetch('https://shopflow-full-stack-e-commerce-platform.onrender.com/api/cart',{headers:{'Authorization':'Bearer '+token}}); if(r.ok){var d=await r.json();guestCount+=(Array.isArray(d)?d:[]).reduce(function(s,i){return s+(i.quantity||1);},0);} } catch(e){}
        if (guestCount>0&&badge){badge.textContent=guestCount;badge.style.display='flex';}
      }

      // Load product
      try {
        var p = await api.get('/products/' + productId);
        var reviews = await api.get('/reviews/' + productId);
        var specs = fakeSpecs[parseInt(productId)] || {'Name': p.name, 'Category': p.category_name||'General', 'Condition': 'New'};
        var condition = fakeConditions[parseInt(productId)] || p.description || 'Item is in good condition.';

        document.title = p.name + ' - ShopFlow';

        // Images
        var catKey = p.category_name && p.category_name.includes('Laptop') ? 'Laptops'
          : p.category_name && p.category_name.includes('Phone') ? 'Phones'
          : p.category_name && p.category_name.includes('Audio') ? 'Audio' : 'default';
        var extraImgs = fakeImages[catKey] || fakeImages['default'];
        var allImgs = [p.image_url || PLACEHOLDER].concat(extraImgs);

        var thumbsHtml = allImgs.map(function(src, i) {
          return '<img class="thumb' + (i===0?' active':'') + '" src="' + src + '" data-src="' + src + '" onclick="setMainImg(this.dataset.src)" onerror="this.style.display='none'" />';
        }).join('');

        var specsHtml = Object.keys(specs).map(function(k) {
          return '<tr><td>' + k + '</td><td>' + specs[k] + '</td></tr>';
        }).join('');

        var sellerHtml = p.seller_id
          ? '<a class="seller-link" href="seller-profile.html?id=' + p.seller_id + '">🏪 ' + (p.seller_name || 'View Seller') + '</a>'
          : '';

        var inStock = p.stock_qty > 0;

        document.getElementById('product-container').innerHTML =
          '<div class="product-layout">' +
          '<div class="media-section">' +
          '<img id="main-img" class="main-img" src="' + allImgs[0] + '" onclick="openZoom(this.src)" onerror="this.src='' + PLACEHOLDER + ''" />' +
          '<div class="thumb-row">' + thumbsHtml + '</div>' +
          '</div>' +
          '<div class="info-section">' +
          '<h1 class="product-title">' + p.name + '</h1>' +
          sellerHtml +
          '<div class="rating-row">' + starsHtml(p.avg_rating, reviews.length) +
          '<span class="badge ' + (inStock ? 'badge-green' : 'badge-orange') + '">' + (inStock ? '✓ In Stock (' + p.stock_qty + ')' : 'Out of Stock') + '</span>' +
          '</div>' +
          '<div class="product-price">$' + parseFloat(p.price).toFixed(2) + '</div>' +
          '<div class="condition-box">📦 ' + condition + '</div>' +
          '<button class="btn-cart" onclick="addToCartDetail(' + p.id + ')"' + (inStock?'':' disabled style="opacity:.5;cursor:not-allowed;"') + '>Add to Cart</button>' +
          '<button class="btn-wishlist">♡ Save to Wishlist</button>' +
          '</div></div>' +

          '<div class="divider"></div>' +
          '<h2 class="section-title">Product Specifications</h2>' +
          '<table class="spec-table"><tbody>' + specsHtml + '</tbody></table>' +

          '<div class="divider"></div>' +
          '<h2 class="section-title">Customer Reviews (' + reviews.length + ')</h2>' +
          '<div class="reviews-section">' +
          (reviews.length ? reviews.map(function(r) {
            var s=''; for(var i=1;i<=5;i++) s+=i<=r.rating?'★':'☆';
            return '<div class="review-card">' +
              '<div class="review-header"><span class="reviewer">' + r.reviewer + '</span><span class="stars">' + s + '</span></div>' +
              '<div class="review-date">' + new Date(r.created_at).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) + '</div>' +
              '<div class="review-comment">' + (r.comment||'') + '</div>' +
              '</div>';
          }).join('') : '<p style="color:#94a3b8;text-align:center;padding:1.5rem;">No reviews yet for this product.</p>') +
          '</div>';

      } catch(e) { console.error(e); document.getElementById('product-container').innerHTML='<p style="text-align:center;padding:3rem;color:#dc2626;">Product not found.</p>'; }
    }

    async function addToCartDetail(productId) {
      var token = localStorage.getItem('sf_token');
      var toast = document.createElement('div');
      toast.style='position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:.75rem 1.5rem;border-radius:10px;font-size:.875rem;font-weight:500;z-index:600;';
      document.body.appendChild(toast);
      if (!token) {
        var cart = JSON.parse(localStorage.getItem('guest_cart')||'[]');
        var ex = cart.find(function(i){return i.id===productId;});
        if(ex){ex.quantity=(ex.quantity||1)+1;}else{cart.push({id:productId,quantity:1});}
        localStorage.setItem('guest_cart', JSON.stringify(cart));
        var badge = document.getElementById('cart-count');
        var total = cart.reduce(function(s,i){return s+(i.quantity||1);},0);
        if(badge&&total>0){badge.textContent=total;badge.style.display='flex';}
        toast.textContent='Added to guest cart!';
      } else {
        try {
          await fetch('https://shopflow-full-stack-e-commerce-platform.onrender.com/api/cart', {method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({product_id:productId,quantity:1})});
          var badge = document.getElementById('cart-count');
          var cur = parseInt(badge.textContent||'0')+1;
          badge.textContent=cur; badge.style.display='flex';
          toast.textContent='Added to cart!';
        } catch(e){toast.textContent='Error adding to cart.';}
      }
      setTimeout(function(){toast.remove();},2000);
    }

    init();
  </script>
</body>
</html>

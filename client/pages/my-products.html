<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Products - ShopFlow</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { background:#f8fafc; }
    .page { max-width:900px; margin:0 auto; padding:2rem 1.5rem 4rem; width:100%; }
    .page-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:2rem; }
    .page-header h1 { font-size:clamp(1.3rem,4vw,1.8rem); font-weight:700; color:#1e293b; }
    .btn-add { display:inline-flex; align-items:center; gap:.5rem; background:#2563eb; color:#fff; padding:.65rem 1.25rem; border-radius:9px; font-weight:600; font-size:.9rem; border:none; cursor:pointer; text-decoration:none; transition:background .2s; }
    .btn-add:hover { background:#1d4ed8; }
    .product-card-seller { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); overflow:hidden; display:flex; flex-direction:column; transition:transform .2s; }
    .product-card-seller:hover { transform:translateY(-3px); }
    .product-card-seller img { width:100%; height:180px; object-fit:cover; background:#e2e8f0; }
    .card-body { padding:1rem; flex:1; display:flex; flex-direction:column; gap:.4rem; }
    .card-body h3 { font-size:.95rem; font-weight:600; color:#1e293b; }
    .card-price { font-size:1.1rem; font-weight:700; color:#2563eb; }
    .card-stock { font-size:.8rem; color:#64748b; }
    .card-actions { display:flex; gap:.5rem; margin-top:.75rem; }
    .btn-edit { flex:1; padding:.5rem; background:#eff6ff; color:#2563eb; border:1px solid #bfdbfe; border-radius:7px; font-size:.82rem; font-weight:600; cursor:pointer; transition:background .2s; }
    .btn-edit:hover { background:#dbeafe; }
    .btn-delete { flex:1; padding:.5rem; background:#fee2e2; color:#dc2626; border:1px solid #fca5a5; border-radius:7px; font-size:.82rem; font-weight:600; cursor:pointer; transition:background .2s; }
    .btn-delete:hover { background:#fecaca; }
    .empty-state { text-align:center; padding:4rem 2rem; }
    .empty-state .icon { font-size:3.5rem; margin-bottom:1rem; }
    .empty-state h2 { font-size:1.2rem; color:#1e293b; margin-bottom:.5rem; }
    .empty-state p { color:#64748b; font-size:.9rem; margin-bottom:1.5rem; }
    .btn-become { display:inline-block; background:#2563eb; color:#fff; padding:.8rem 2rem; border-radius:10px; font-weight:700; text-decoration:none; font-size:.95rem; transition:background .2s; }
    .btn-become:hover { background:#1d4ed8; }
    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius:16px; padding:2rem; width:90%; max-width:480px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
    .modal h2 { font-size:1.2rem; font-weight:700; margin-bottom:1.25rem; color:#1e293b; }
    .form-group { margin-bottom:1rem; display:flex; flex-direction:column; gap:.3rem; }
    .form-group label { font-size:.85rem; font-weight:600; color:#374151; }
    .form-group input, .form-group textarea, .form-group select { padding:.6rem .8rem; border:1.5px solid #e2e8f0; border-radius:8px; font-size:.9rem; outline:none; font-family:inherit; transition:border .2s; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:#2563eb; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .modal-actions { display:flex; gap:.75rem; margin-top:1.5rem; }
    .btn-submit { flex:1; padding:.75rem; background:#2563eb; color:#fff; border:none; border-radius:9px; font-size:.95rem; font-weight:600; cursor:pointer; }
    .btn-submit:hover { background:#1d4ed8; }
    .btn-cancel { flex:1; padding:.75rem; background:#f1f5f9; color:#64748b; border:none; border-radius:9px; font-size:.95rem; font-weight:600; cursor:pointer; }
    .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); background:#1e293b; color:#fff; padding:.75rem 1.5rem; border-radius:10px; font-size:.875rem; font-weight:500; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; }
    .toast.show { opacity:1; }
    @keyframes badgePop { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.3)} 100%{transform:scale(1);opacity:1} }
    @media (max-width:640px) { .form-row { grid-template-columns:1fr; } .page { padding:1rem .75rem 3rem; } }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div style="position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 8px rgba(0,0,0,.06);">
    <div style="display:flex;align-items:center;gap:1rem;padding:0 1.5rem;height:64px;max-width:1200px;margin:0 auto;width:100%;">
      <button id="hamburger" onclick="toggleDrawer()" style="display:flex;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:.4rem;">
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
      </button>
      <a href="../index.html" style="font-family:Georgia,serif;font-size:1.6rem;font-weight:900;color:#2563eb;text-decoration:none;letter-spacing:-.5px;white-space:nowrap;">ShopFlow</a>

      <div style="display:flex;align-items:center;gap:.75rem;margin-left:auto;">
        <button onclick="window.location.href='cart.html'" style="position:relative;background:none;border:none;cursor:pointer;color:#6b7280;padding:.4rem;border-radius:8px;display:flex;align-items:center;">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span id="cart-count" style="display:none;position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;font-size:.65rem;font-weight:800;min-width:18px;height:18px;border-radius:999px;align-items:center;justify-content:center;border:2px solid #fff;padding:0 3px;animation:badgePop .4s cubic-bezier(.36,2,.6,1) both;">0</span>
        </button>
        <a id="nav-auth-btn" href="register.html" style="background:#2563eb;color:#fff;padding:.5rem 1.2rem;border-radius:8px;font-size:.875rem;font-weight:600;text-decoration:none;white-space:nowrap;">Get Started</a>
      </div>
    </div>
  </div>



  <!-- Drawer overlay -->
  <div id="drawer-overlay" onclick="toggleDrawer()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:180;"></div>

  <!-- Side Drawer -->
  <nav id="nav-drawer" style="position:fixed;top:64px;left:0;bottom:0;width:280px;background:#fff;border-right:1px solid #e5e7eb;box-shadow:4px 0 20px rgba(0,0,0,.1);transform:translateX(-100%);transition:transform .3s ease;z-index:190;padding:1.5rem;display:flex;flex-direction:column;gap:.5rem;">
    <a href="../index.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a href="products.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Products</a>
    <a href="my-products.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;background:#eff6ff;color:#2563eb;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>My Products</a>
    <a href="about.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>About</a>
    <a href="purchases.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/></svg>My Orders</a>
    <a href="profile.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
    <a href="dashboard.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a id="drawer-settings-link" href="settings.html" style="display:none;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Settings</a>
    <div style="height:1px;background:#e5e7eb;margin:.5rem 0;"></div>
    <a id="drawer-login-link" href="login.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Login</a>
    <a id="drawer-cta-btn" href="register.html" style="display:block;text-align:center;background:#2563eb;color:#fff;padding:.8rem;border-radius:10px;font-weight:600;text-decoration:none;margin-top:auto;">Create Account</a>
  </nav>

  <!-- PAGE -->
  <!-- SEARCH BAR -->
  <div style="background:#1d4ed8;padding:.5rem 1rem;">
    <div style="display:flex;align-items:center;gap:.5rem;max-width:900px;margin:0 auto;">
      <input type="text" id="product-search" placeholder="Search your products..." style="flex:1;padding:.5rem .85rem;border-radius:8px;border:none;font-size:.9rem;outline:none;background:#fff;color:#1e293b;" oninput="filterProducts(this.value)"/>
      <button onclick="filterProducts(document.getElementById('product-search').value)" style="padding:.5rem 1.1rem;background:#f59e0b;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;white-space:nowrap;">Search</button>
    </div>
  </div>

  <div class="page">
    <div class="page-header">
      <h1 id="page-title">My Products</h1>
      <button class="btn-add" id="add-product-btn" style="display:none;" onclick="openModal()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Product
      </button>
    </div>
    <div id="products-container"><p class="loading">Loading...</p></div>
  </div>

  <!-- Add/Edit Product Modal -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal">
      <h2 id="modal-title">Add New Product</h2>
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="prod-name" placeholder="e.g. MacBook Pro 14&quot;" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="prod-desc" rows="3" placeholder="Describe your product..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price ($)</label>
          <input type="number" id="prod-price" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label>Stock Quantity</label>
          <input type="number" id="prod-stock" placeholder="0" min="0" />
        </div>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="text" id="prod-image" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="prod-category"><option value="">Select category...</option></select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-submit" onclick="saveProduct()">Save Product</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/api.js"></script>
  <script>
    var editingId = null;
    var user = null;
    try { user = JSON.parse(localStorage.getItem('sf_user') || 'null'); } catch(e) {}

    function toggleDrawer() {
      var drawer = document.getElementById('nav-drawer');
      var overlay = document.getElementById('drawer-overlay');
      var open = drawer.style.transform === 'translateX(0px)' || drawer.style.transform === 'translateX(0)';
      drawer.style.transform = open ? 'translateX(-100%)' : 'translateX(0)';
      overlay.style.display = open ? 'none' : 'block';
    }
    function handleSearch() {
      var q = document.getElementById('nav-search-input').value.trim();
      if (q) window.location.href = 'products.html?search=' + encodeURIComponent(q);
    }
    document.getElementById('nav-search-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleSearch(); });

    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    // Auth navbar
    (function() {
      var token = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
      var btn = document.getElementById('nav-auth-btn');
      var drawerLogin = document.getElementById('drawer-login-link');
      var drawerCta = document.getElementById('drawer-cta-btn');
      if (token) {
        btn.textContent = 'Logout'; btn.href = '#';
        btn.style.background = 'transparent'; btn.style.color = '#dc2626'; btn.style.border = '2px solid #dc2626';
        btn.addEventListener('click', function(e) { e.preventDefault(); localStorage.removeItem('sf_token'); localStorage.removeItem('sf_user'); window.location.href = 'login.html'; }, { once: true });
        if (drawerLogin) drawerLogin.style.display = 'none';
        if (drawerCta) {
          drawerCta.textContent = 'Logout';
          drawerCta.removeAttribute('href');
          drawerCta.style.background = '#dc2626';
          drawerCta.style.cursor = 'pointer';
          drawerCta.onclick = function(e) {
            e.preventDefault();
            e.stopPropagation();
            localStorage.removeItem('sf_token');
            localStorage.removeItem('sf_user');
            window.location.href = 'login.html';
          };
        }
      } else {
        window.location.href = 'login.html';
      }
    })();

    // Cart badge
    (function() {
      var token = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
      var badge = document.getElementById('cart-count');
      if (token) {
        fetch('https://shopflow-full-stack-e-commerce-platform.onrender.com/api/cart', { headers: { 'Authorization': 'Bearer ' + token } })
          .then(function(r) { return r.json(); }).then(function(data) {
            var total = (Array.isArray(data) ? data : []).reduce(function(s,i){ return s+(i.quantity||1); }, 0);
            if (total > 0) { badge.textContent = total; badge.style.display = 'flex'; }
          }).catch(function(){});
      }
    })();

    // Load categories for modal
    async function loadCategories() {
      var cats = await api.get('/categories');
      if (!Array.isArray(cats)) return;
      var sel = document.getElementById('prod-category');
      cats.filter(function(c){ return !c.parent_category_id; }).forEach(function(c) {
        var opt = document.createElement('option');
        opt.value = c.id; opt.textContent = c.name; sel.appendChild(opt);
      });
    }

    // Main: load page based on role
    async function init() {
      var container = document.getElementById('products-container');
      if (!user) { window.location.href = 'login.html'; return; }

      if (user.role !== 'seller' && user.role !== 'admin') {
        // CUSTOMER VIEW
        document.getElementById('page-title').textContent = 'My Products';
        container.innerHTML = '<div class="empty-state">' +
          '<div class="icon">&#128722;</div>' +
          '<h2>You do not have any products yet</h2>' +
          '<p>Become a seller on ShopFlow to list your products and start earning.</p>' +
          '<a href="seller.html" class="btn-become">Become a Seller</a>' +
          '</div>';
        return;
      }

      // SELLER VIEW
      document.getElementById('add-product-btn').style.display = 'inline-flex';
      loadCategories();
      await loadProducts();
    }

    var allProducts = [];

    function filterProducts(query) {
      var q = (query || '').toLowerCase().trim();
      var filtered = q ? allProducts.filter(function(p) {
        return p.name.toLowerCase().includes(q) ||
               (p.description && p.description.toLowerCase().includes(q));
      }) : allProducts;
      renderProductList(filtered, q);
    }

    function renderProductList(products, query) {
      var container = document.getElementById('products-container');
      var PLACEHOLDER = 'https://placehold.co/400x300/e2e8f0/94a3b8?text=No+Image';
      if (products.length === 0) {
        if (query) {
          container.innerHTML = [
            '<div class="empty-state">',
            '<div class="icon">&#128269;</div>',
            '<h2>No products found</h2>',
            '<p>No products match <strong>' + query + '</strong>. Try a different keyword.</p>',
            '<button class="btn-become" onclick="clearProductSearch()">Clear Search</button>',
            '</div>'
          ].join('');
        } else {
          container.innerHTML = [
            '<div class="empty-state">',
            '<div class="icon">&#128230;</div>',
            '<h2>No products in your inventory</h2>',
            '<p>Want to add a product? Get started and list your first item on ShopFlow.</p>',
            '<button class="btn-become" onclick="openModal()" style="margin-top:.5rem;">+ Add Product</button>',
            '</div>'
          ].join('');
        }
        return;
      }
      var rows = products.map(function(p) {
        var img = p.image_url || PLACEHOLDER;
        var price = parseFloat(p.price).toFixed(2);
        var stock = p.stock_quantity || 0;
        var pJson = JSON.stringify(p).replace(/"/g, '&quot;');
        return [
          '<div class="product-card-seller">',
          '<img src="' + img + '" alt="' + p.name + '" />',
          '<div class="card-body">',
          '<h3>' + p.name + '</h3>',
          '<div class="card-price">$' + price + '</div>',
          '<div class="card-stock">Stock: ' + stock + '</div>',
          '<div class="card-actions">',
          '<button class="btn-edit" onclick="editProduct(' + pJson + ')">Edit</button>',
          '<button class="btn-delete" onclick="deleteProduct(' + p.id + ')">Delete</button>',
          '</div></div></div>'
        ].join('');
      });
      container.innerHTML = '<div class="product-grid">' + rows.join('') + '</div>';
    }

    async function loadProducts() {
      var container = document.getElementById('products-container');
      container.innerHTML = '<p class="loading">Loading your products...</p>';
      try {
        var products = await api.get('/products/my');
        if (!Array.isArray(products) || products.length === 0) {
          products = [];
        }
        allProducts = products;
        renderProductList(products, '');
      } catch(e) {
        container.innerHTML = '<p style="color:#ef4444;text-align:center;padding:2rem;">Failed to load products. Please try again.</p>';
      }
    }

    function openModal(reset) {
      if (reset !== false) {
        editingId = null;
        document.getElementById('modal-title').textContent = 'Add New Product';
        document.getElementById('prod-name').value = '';
        document.getElementById('prod-desc').value = '';
        document.getElementById('prod-price').value = '';
        document.getElementById('prod-stock').value = '';
        document.getElementById('prod-image').value = '';
        document.getElementById('prod-category').value = '';
      }
      document.getElementById('product-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      document.getElementById('product-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function editProduct(p) {
      editingId = p.id;
      document.getElementById('modal-title').textContent = 'Edit Product';
      document.getElementById('prod-name').value = p.name || '';
      document.getElementById('prod-desc').value = p.description || '';
      document.getElementById('prod-price').value = p.price || '';
      document.getElementById('prod-stock').value = p.stock_quantity || '';
      document.getElementById('prod-image').value = p.image_url || '';
      document.getElementById('prod-category').value = p.category_id || '';
      openModal(false);
    }

    async function saveProduct() {
      var name = document.getElementById('prod-name').value.trim();
      var price = document.getElementById('prod-price').value;
      if (!name || !price) { showToast('Name and price are required.'); return; }
      var body = {
        name: name,
        description: document.getElementById('prod-desc').value.trim(),
        price: parseFloat(price),
        stock_quantity: parseInt(document.getElementById('prod-stock').value) || 0,
        image_url: document.getElementById('prod-image').value.trim(),
        category_id: document.getElementById('prod-category').value || null
      };
      try {
        if (editingId) {
          await api.put('/products/' + editingId, body);
          showToast('Product updated!');
        } else {
          await api.post('/products', body);
          showToast('Product added!');
        }
        closeModal();
        await loadProducts();
      } catch(e) {
        showToast('Error saving product. Please try again.');
      }
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product? This cannot be undone.')) return;
      try {
        await api.delete('/products/' + id);
        showToast('Product deleted.');
        await loadProducts();
      } catch(e) {
        showToast('Error deleting product.');
      }
    }

    // Close modal on backdrop click
    document.getElementById('product-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    init();
  
    // Show Settings only when logged in
    (function showSettingsIfLoggedIn() {
      var token = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
      var el = document.getElementById('drawer-settings-link');
      if (token && el) el.style.display = 'flex';
    })();
  </script>
</body>
</html>

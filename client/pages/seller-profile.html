<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Profile - ShopFlow</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { background:#f8fafc; }
    .page { max-width:960px; margin:0 auto; padding:2rem 1.5rem 4rem; }
    .seller-hero { background:linear-gradient(135deg,#1d4ed8,#7c3aed); border-radius:16px; padding:2rem; color:#fff; display:flex; align-items:center; gap:1.5rem; margin-bottom:2rem; flex-wrap:wrap; }
    .seller-avatar { width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700; flex-shrink:0; border:3px solid rgba(255,255,255,.4); overflow:hidden; padding:0; }
    .seller-info h1 { font-size:1.4rem; font-weight:700; margin-bottom:.25rem; }
    .seller-info p { font-size:.9rem; opacity:.8; }
    .seller-stats { display:flex; gap:1.5rem; margin-top:1rem; flex-wrap:wrap; }
    .seller-stat { text-align:center; }
    .seller-stat .val { font-size:1.4rem; font-weight:700; }
    .seller-stat .lbl { font-size:.75rem; opacity:.75; }
    .stars { color:#f59e0b; font-size:1rem; }
    .section-title { font-size:1.1rem; font-weight:700; color:#1e293b; margin-bottom:1rem; padding-bottom:.5rem; border-bottom:2px solid #e2e8f0; }
    .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; margin-bottom:2.5rem; }
    .product-card { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); overflow:hidden; cursor:pointer; transition:transform .2s; }
    .product-card:hover { transform:translateY(-3px); }
    .product-card img { width:100%; height:160px; object-fit:cover; background:#e2e8f0; }
    .product-card-body { padding:.85rem; }
    .product-card-body h3 { font-size:.9rem; font-weight:600; color:#1e293b; margin-bottom:.3rem; }
    .product-card-body .price { font-size:1rem; font-weight:700; color:#2563eb; }
    .product-card-body .rating { font-size:.78rem; color:#64748b; margin-top:.2rem; }
    .reviews-list { display:flex; flex-direction:column; gap:1rem; margin-bottom:2rem; }
    .review-card { background:#fff; border-radius:12px; padding:1.25rem; box-shadow:0 1px 6px rgba(0,0,0,.07); }
    .review-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.5rem; flex-wrap:wrap; gap:.5rem; }
    .reviewer-name { font-weight:600; color:#1e293b; font-size:.9rem; }
    .review-product { font-size:.78rem; color:#64748b; margin-bottom:.4rem; }
    .review-comment { font-size:.875rem; color:#374151; line-height:1.5; }
    .review-date { font-size:.75rem; color:#94a3b8; }
    .write-review { background:#fff; border-radius:14px; padding:1.5rem; box-shadow:0 1px 6px rgba(0,0,0,.07); margin-bottom:2rem; }
    .write-review h3 { font-size:1rem; font-weight:700; margin-bottom:1rem; color:#1e293b; }
    .star-select { display:flex; gap:.3rem; margin-bottom:1rem; }
    .star-select span { font-size:1.5rem; cursor:pointer; color:#cbd5e1; transition:color .15s; }
    .star-select span.active { color:#f59e0b; }
    .review-textarea { width:100%; padding:.75rem; border:1.5px solid #e2e8f0; border-radius:8px; font-size:.9rem; font-family:inherit; outline:none; resize:vertical; min-height:80px; box-sizing:border-box; transition:border .2s; }
    .review-textarea:focus { border-color:#2563eb; }
    .review-product-select { width:100%; padding:.6rem .8rem; border:1.5px solid #e2e8f0; border-radius:8px; font-size:.9rem; margin-bottom:.75rem; outline:none; }
    .btn-review { background:#2563eb; color:#fff; border:none; border-radius:9px; padding:.7rem 1.5rem; font-size:.9rem; font-weight:600; cursor:pointer; margin-top:.75rem; }
    .btn-review:hover { background:#1d4ed8; }
    .empty { text-align:center; padding:2rem; color:#94a3b8; font-size:.9rem; }
    @media(max-width:600px) { .seller-hero { flex-direction:column; } .products-grid { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <div style="position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 8px rgba(0,0,0,.06);">
    <div style="display:flex;align-items:center;gap:1rem;padding:0 1rem;height:64px;max-width:1200px;margin:0 auto;width:100%;overflow:hidden;">
      <button id="hamburger" onclick="toggleDrawer()" style="display:flex;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:.4rem;">
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
      </button>
      <a href="../index.html" style="font-family:Georgia,serif;font-size:clamp(1rem,4vw,1.6rem);font-weight:900;color:#2563eb;text-decoration:none;letter-spacing:-.5px;">ShopFlow</a>
      <div style="display:flex;align-items:center;gap:.75rem;margin-left:auto;">
        <button onclick="window.location.href='cart.html'" style="position:relative;background:none;border:none;cursor:pointer;color:#6b7280;padding:.4rem;border-radius:8px;display:flex;align-items:center;">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span id="cart-count" style="display:none;position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;font-size:.65rem;font-weight:800;min-width:18px;height:18px;border-radius:999px;align-items:center;justify-content:center;border:2px solid #fff;padding:0 3px;">0</span>
        </button>
        <a id="nav-auth-btn" href="login.html" style="background:#2563eb;color:#fff;padding:.45rem .75rem;border-radius:8px;font-size:.8rem;font-weight:600;text-decoration:none;white-space:nowrap;">Get Started</a>
      </div>
    </div>
  </div>

  <!-- Drawer -->
  <div id="drawer-overlay" onclick="toggleDrawer()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:180;"></div>
  <nav id="nav-drawer" style="position:fixed;top:64px;left:0;bottom:0;width:280px;background:#fff;border-right:1px solid #e5e7eb;box-shadow:4px 0 20px rgba(0,0,0,.1);transform:translateX(-100%);transition:transform .3s ease;z-index:190;padding:1.5rem;display:flex;flex-direction:column;gap:.5rem;">
    <a href="../index.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a href="products.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Products</a>
    <a href="my-products.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">Seller's Profile</a>
    <a href="purchases.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/></svg>My Orders</a>
    <a href="profile.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
    <a href="dashboard.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a id="drawer-settings-link" href="settings.html" style="display:none;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Settings</a>
    <div style="height:1px;background:#e5e7eb;margin:.5rem 0;"></div>
    <a id="drawer-login-link" href="login.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Login</a>
    <a id="drawer-cta-btn" href="register.html" style="display:block;text-align:center;background:#2563eb;color:#fff;padding:.8rem;border-radius:10px;font-weight:600;text-decoration:none;margin-top:auto;">Create Account</a>
  </nav>

  <div class="page">
    <div id="seller-hero-container"></div>
    <h2 class="section-title" id="products-title">Products</h2>
    <div class="products-grid" id="products-grid"></div>
    <h2 class="section-title">Write a Review</h2>
    <div class="write-review" id="write-review-section">
      <select class="review-product-select" id="review-product-select"><option value="">Select a product to review...</option></select>
      <div class="star-select" id="star-select">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
      </div>
      <textarea class="review-textarea" id="review-comment" placeholder="Share your experience..."></textarea>
      <button class="btn-review" onclick="submitReview()">Post Review</button>
      <p id="review-msg" style="margin-top:.5rem;font-size:.85rem;"></p>
    </div>
    <h2 class="section-title">Customer Reviews</h2>
    <div id="reviews-list"></div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    var sellerId = new URLSearchParams(location.search).get('id');
    var selectedRating = 0;

    if (!sellerId) window.location.href = '../index.html';

    function toggleDrawer() {
      var drawer = document.getElementById('nav-drawer');
      var overlay = document.getElementById('drawer-overlay');
      var open = drawer.style.transform === 'translateX(0px)' || drawer.style.transform === 'translateX(0)';
      drawer.style.transform = open ? 'translateX(-100%)' : 'translateX(0)';
      overlay.style.display = open ? 'none' : 'block';
    }

    function stars(rating, count) {
      var s = '';
      for (var i = 1; i <= 5; i++) s += i <= Math.round(rating) ? '★' : '☆';
      return '<span class="stars">' + s + '</span> ' + (rating || '0') + (count !== undefined ? ' (' + count + ')' : '');
    }

    async function init() {
      // Auth navbar
      var token = localStorage.getItem('sf_token');
      var btn = document.getElementById('nav-auth-btn');
      var drawerLogin = document.getElementById('drawer-login-link');
      var drawerCta = document.getElementById('drawer-cta-btn');
      var drawerSettings = document.getElementById('drawer-settings-link');
      if (token) {
        var user = JSON.parse(localStorage.getItem('sf_user') || '{}');
        btn.textContent = user.name ? user.name.split(' ')[0] : 'Account';
        btn.href = 'dashboard.html';
        btn.style.background = 'transparent';
        btn.style.color = '#2563eb';
        btn.style.border = '2px solid #2563eb';
        if (drawerLogin) drawerLogin.style.display = 'none';
        if (drawerSettings) drawerSettings.style.display = 'flex';
        if (drawerCta) { drawerCta.textContent = 'Logout'; drawerCta.removeAttribute('href'); drawerCta.style.background = '#dc2626'; drawerCta.onclick = function() { localStorage.removeItem('sf_token'); localStorage.removeItem('sf_user'); window.location.href = 'login.html'; }; }
        // Cart badge
        var badge = document.getElementById('cart-count');
        var guestCount = JSON.parse(localStorage.getItem('guest_cart') || '[]').reduce(function(s,i){return s+(i.quantity||1);},0);
        try {
          var r = await fetch('https://shopflow-full-stack-e-commerce-platform.onrender.com/api/cart', { headers: { 'Authorization': 'Bearer ' + token } });
          if (r.ok) { var d = await r.json(); var apiCount = (Array.isArray(d)?d:[]).reduce(function(s,i){return s+(i.quantity||1);},0); guestCount += apiCount; }
        } catch(e) {}
        if (guestCount > 0 && badge) { badge.textContent = guestCount; badge.style.display = 'flex'; }
      }

      // Load seller data
      try {
        var data = await api.get('/sellers/' + sellerId);
        var s = data.seller;
        var stats = data.stats;

        // Hero
        document.getElementById('seller-hero-container').innerHTML =
          '<div class="seller-hero">' +
          '<div class="seller-avatar" style="padding:0;overflow:hidden;"><img src="https://ui-avatars.com/api/?name='+encodeURIComponent(s.name)+'&size=72&rounded=true&background=random&color=fff&bold=true&font-size=0.4" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" /></div>' +
          '<div class="seller-info">' +
          '<h1>' + s.name + '</h1>' +
          '<p>Member since ' + new Date(s.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long'}) + '</p>' +
          '<div class="seller-stats">' +
          '<div class="seller-stat"><div class="val">' + (stats.total_products||0) + '</div><div class="lbl">Products</div></div>' +
          '<div class="seller-stat"><div class="val">' + stars(stats.avg_rating) + '</div><div class="lbl">Avg Rating</div></div>' +
          '<div class="seller-stat"><div class="val">' + (stats.total_reviews||0) + '</div><div class="lbl">Reviews</div></div>' +
          '</div></div></div>';

        // Products grid
        var PLACEHOLDER = 'https://placehold.co/400x300/e2e8f0/94a3b8?text=No+Image';
        document.getElementById('products-title').textContent = s.name + "'s Products (" + data.products.length + ")";
        document.getElementById('products-grid').innerHTML = data.products.map(function(p) {
          return '<div class="product-card" onclick="window.location.href=\'product-detail.html?id=' + p.id + '\'">' +
            '<img src="'+(p.image_url||PLACEHOLDER)+'" alt="'+p.name+'" />' +
            '<div class="product-card-body">' +
            '<h3>'+p.name+'</h3>' +
            '<div class="price">$'+parseFloat(p.price).toFixed(2)+'</div>' +
            '<div class="rating">'+stars(p.avg_rating, p.review_count)+'</div>' +
            '</div></div>';
        }).join('') || '<div class="empty">No products listed yet.</div>';

        // Populate product select for review
        var sel = document.getElementById('review-product-select');
        data.products.forEach(function(p) {
          var opt = document.createElement('option');
          opt.value = p.id; opt.textContent = p.name; sel.appendChild(opt);
        });

        // Load reviews
        loadReviews();
      } catch(e) { console.error(e); }
    }

    async function loadReviews() {
      try {
        var reviews = await api.get('/sellers/' + sellerId + '/reviews');
        var el = document.getElementById('reviews-list');
        if (!reviews.length) { el.innerHTML = '<div class="empty">No reviews yet. Be the first!</div>'; return; }
        el.innerHTML = '<div class="reviews-list">' + reviews.map(function(r) {
          var s = '';
          for (var i = 1; i <= 5; i++) s += i <= r.rating ? '★' : '☆';
          return '<div class="review-card">' +
            '<div class="review-header">' +
            '<span class="reviewer-name">' + r.reviewer + '</span>' +
            '<span class="stars">' + s + '</span>' +
            '</div>' +
            '<div class="review-product">on: ' + r.product_name + '</div>' +
            '<div class="review-comment">' + r.comment + '</div>' +
            '<div class="review-date">' + new Date(r.created_at).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) + '</div>' +
            '</div>';
        }).join('') + '</div>';
      } catch(e) {}
    }

    // Star select
    document.getElementById('star-select').addEventListener('click', function(e) {
      if (e.target.dataset.v) {
        selectedRating = parseInt(e.target.dataset.v);
        document.querySelectorAll('#star-select span').forEach(function(s, i) {
          s.classList.toggle('active', i < selectedRating);
        });
      }
    });

    async function submitReview() {
      var token = localStorage.getItem('sf_token');
      if (!token) { window.location.href = 'login.html'; return; }
      var product_id = document.getElementById('review-product-select').value;
      var comment = document.getElementById('review-comment').value.trim();
      var msg = document.getElementById('review-msg');
      if (!product_id) { msg.style.color='#dc2626'; msg.textContent='Please select a product.'; return; }
      if (!selectedRating) { msg.style.color='#dc2626'; msg.textContent='Please select a rating.'; return; }
      try {
        await api.post('/sellers/' + sellerId + '/reviews', { product_id: parseInt(product_id), rating: selectedRating, comment });
        msg.style.color='#22c55e'; msg.textContent='Review posted!';
        document.getElementById('review-comment').value = '';
        selectedRating = 0;
        document.querySelectorAll('#star-select span').forEach(function(s) { s.classList.remove('active'); });
        loadReviews();
      } catch(e) { msg.style.color='#dc2626'; msg.textContent='Error posting review. You may have already reviewed this product.'; }
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ShopFlow</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .auth-box { max-width:420px; margin:4rem auto; background:#fff; padding:2rem; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,.1); }
    .auth-box h2 { margin-bottom:1.5rem; }
    .form-group { margin-bottom:1rem; display:flex; flex-direction:column; gap:.35rem; }
    .form-group label { font-weight:500; font-size:.9rem; }
    .input-wrap { position:relative; display:flex; }
    .input-wrap input { flex:1; padding:.6rem .8rem; padding-right:4rem; border:1px solid #cbd5e1; border-radius:6px; font-size:1rem; outline:none; transition:border .2s; }
    .input-wrap input:focus { border-color:#2563eb; }
    .toggle-pw { position:absolute; right:.6rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:.75rem; font-weight:600; color:#2563eb; letter-spacing:.03em; text-transform:uppercase; }
    .toggle-pw:hover { color:#1d4ed8; }
    .btn-primary { width:100%; padding:.75rem; font-size:1rem; }
    .switch { text-align:center; margin-top:1rem; font-size:.9rem; color:#64748b; }
    .switch a { color:#2563eb; }
    #error { color:red; font-size:.9rem; margin-bottom:.5rem; min-height:1.2rem; }
  
    @media (max-width:480px) {
      .auth-box { margin:1.5rem auto; padding:1.25rem; border-radius:8px; }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <div style="position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 8px rgba(0,0,0,.06);">
    <div style="display:flex;align-items:center;gap:1rem;padding:0 1.5rem;height:64px;max-width:1200px;margin:0 auto;width:100%;">
      <button id="hamburger" onclick="toggleDrawer()" style="display:flex;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:.4rem;">
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
      </button>
      <a href="../index.html" style="font-family:Georgia,serif;font-size:1.6rem;font-weight:900;color:#2563eb;text-decoration:none;letter-spacing:-.5px;white-space:nowrap;">ShopFlow</a>
      <div style="flex:1;max-width:480px;display:flex;align-items:center;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;overflow:hidden;">
        <input type="text" id="nav-search-input" placeholder="Search products..." style="flex:1;min-width:0;border:none;background:#f9fafb;padding:.55rem .75rem;font-size:.9rem;outline:none;width:100%;color:#111827;"/>
        <button onclick="handleSearch()" style="background:#2563eb;border:none;cursor:pointer;padding:.55rem .9rem;color:#fff;display:flex;align-items:center;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;margin-left:auto;">
        <button onclick="window.location.href='cart.html'" style="position:relative;background:none;border:none;cursor:pointer;color:#6b7280;padding:.4rem;border-radius:8px;display:flex;align-items:center;">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span id="cart-count" style="display:none;position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;font-size:.65rem;font-weight:800;min-width:18px;height:18px;border-radius:999px;align-items:center;justify-content:center;border:2px solid #fff;padding:0 3px;">0</span>
        </button>
        <a href="register.html" style="background:#2563eb;color:#fff;padding:.5rem 1.2rem;border-radius:8px;font-size:.875rem;font-weight:600;text-decoration:none;white-space:nowrap;">Get Started</a>
      </div>
    </div>
  </div>

  <!-- Drawer overlay -->
  <div id="drawer-overlay" onclick="toggleDrawer()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:180;"></div>

  <!-- Side Drawer -->
  <nav id="nav-drawer" style="position:fixed;top:64px;left:0;bottom:0;width:280px;background:#fff;border-right:1px solid #e5e7eb;box-shadow:4px 0 20px rgba(0,0,0,.1);transform:translateX(-100%);transition:transform .3s ease;z-index:190;padding:1.5rem;display:flex;flex-direction:column;gap:.5rem;">
    <a href="../index.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a href="products.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Products</a>
    <a href="my-products.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>My Products</a>
    <a href="about.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>About</a>
    <a href="purchases.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/></svg>My Orders</a>
    <a href="dashboard.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a id="drawer-settings-link" href="settings.html" style="display:none;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Settings</a>
    <div style="height:1px;background:#e5e7eb;margin:.5rem 0;"></div>
    <a href="register.html" style="display:block;text-align:center;background:#2563eb;color:#fff;padding:.8rem;border-radius:10px;font-weight:600;text-decoration:none;margin-top:auto;">Create Account</a>
  </nav>
  <div class="auth-box">
    <h2>Login</h2>
    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap">
        <input id="email" type="email" placeholder="you@example.com" />
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input id="password" type="password" placeholder="••••••••" />
        <button class="toggle-pw" type="button" data-target="password">Show</button>
      </div>
    </div>
    <p id="error"></p>
    <button class="btn-primary" id="loginBtn">Login</button>
    <p class="switch">No account? <a href="register.html">Register</a></p>
  </div>
  <script src="../js/api.js"></script>
  <script>
    document.querySelectorAll('.toggle-pw').forEach(btn => {
      btn.addEventListener('click', function() {
        const input = document.getElementById(this.dataset.target);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? 'Hide' : 'Show';
      });
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await api.post('/auth/login', { email, password });
      if (res.token) {
        localStorage.setItem('sf_token', res.token);
        localStorage.setItem('sf_user', JSON.stringify(res.user));
        window.location.href = '/index.html';
      } else {
        document.getElementById('error').textContent = res.error || 'Login failed';
      }
    });

    function toggleDrawer() {
      var drawer = document.getElementById('nav-drawer');
      var overlay = document.getElementById('drawer-overlay');
      var open = drawer.style.transform === 'translateX(0px)' || drawer.style.transform === 'translateX(0)';
      drawer.style.transform = open ? 'translateX(-100%)' : 'translateX(0)';
      overlay.style.display = open ? 'none' : 'block';
    }
    function handleSearch() {
      var q = document.getElementById('nav-search-input').value.trim();
      if (q) window.location.href = 'products.html?search=' + encodeURIComponent(q);
    }
    document.getElementById('nav-search-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSearch();
    });
    // Cart badge from guest cart
    (function() {
      var guest = JSON.parse(localStorage.getItem('guest_cart') || '[]');
      var total = guest.reduce(function(s,i){ return s+(i.quantity||1); }, 0);
      var badge = document.getElementById('cart-count');
      if (total > 0) { badge.textContent = total; badge.style.display = 'flex'; }
    })();
  
    // Show Settings only when logged in
    (function showSettingsIfLoggedIn() {
      var token = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
      var el = document.getElementById('drawer-settings-link');
      if (token && el) el.style.display = 'flex';
    })();
  </script>
</body>
</html>

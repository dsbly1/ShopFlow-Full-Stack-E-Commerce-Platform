<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — ShopFlow</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { background:#f1f5f9; }
    .page { max-width:860px; margin:0 auto; padding:2rem 1.5rem 4rem; }
    .welcome { background:linear-gradient(135deg,#1d4ed8,#7c3aed); color:#fff; border-radius:14px; padding:2rem; margin-bottom:2rem; display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; }
    .avatar { width:70px; height:70px; background:rgba(255,255,255,.2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700; flex-shrink:0; }
    .welcome h1 { font-size:1.5rem; margin-bottom:.2rem; }
    .welcome p { opacity:.85; font-size:.9rem; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
    .card { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); padding:1.5rem; margin-bottom:1.5rem; }
    .card h2 { font-size:1rem; font-weight:700; margin-bottom:1.25rem; padding-bottom:.75rem; border-bottom:1px solid #f1f5f9; }
    .form-group { display:flex; flex-direction:column; gap:.3rem; margin-bottom:.85rem; }
    .form-group label { font-weight:500; font-size:.85rem; color:#374151; }
    .form-group input, .form-group select { padding:.55rem .75rem; border:1px solid #cbd5e1; border-radius:7px; font-size:.9rem; outline:none; transition:border .2s; }
    .form-group input:focus, .form-group select:focus { border-color:#2563eb; }
    .form-group .hint { font-size:.75rem; color:#94a3b8; margin-top:.15rem; }
    .btn-save { padding:.6rem 1.5rem; background:#2563eb; color:#fff; border:none; border-radius:7px; font-weight:600; cursor:pointer; font-size:.9rem; }
    .btn-save:hover { opacity:.88; }
    .btn-danger { padding:.6rem 1.5rem; background:#fff; color:#ef4444; border:1.5px solid #ef4444; border-radius:7px; font-weight:600; cursor:pointer; font-size:.9rem; }
    .btn-danger:hover { background:#fef2f2; }
    .msg { font-size:.85rem; margin-top:.5rem; min-height:1.1rem; }
    .back-link { display:inline-flex; align-items:center; gap:.4rem; color:#2563eb; font-size:.9rem; font-weight:500; text-decoration:none; margin-bottom:1.5rem; }
    .back-link:hover { opacity:.8; }
    @media(max-width:640px) { .grid2 { grid-template-columns:1fr; } }

    .side-menu-btn { background:none; border:none; cursor:pointer; color:#fff; font-size:1.4rem; line-height:1; padding:0 .5rem 0 0; display:flex; align-items:center; }
    .side-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:300; }
    .side-overlay.open { display:block; }
    .side-drawer { position:fixed; top:0; left:-280px; width:280px; height:100vh; background:#fff; z-index:400; transition:left .25s ease; display:flex; flex-direction:column; box-shadow:4px 0 20px rgba(0,0,0,.15); }
    .side-drawer.open { left:0; }
    .drawer-header { background:#2563eb; color:#fff; padding:1.25rem 1.5rem; display:flex; align-items:center; justify-content:space-between; }
    .drawer-header .logo-text { font-size:1.3rem; font-weight:700; }
    .drawer-close { background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; }
    .drawer-user { padding:1rem 1.5rem; border-bottom:1px solid #e2e8f0; font-size:.9rem; color:#64748b; cursor:pointer; }
    .drawer-user:hover { background:#f8fafc; }
    .drawer-user strong { display:block; color:#1e293b; font-size:1rem; }
    .drawer-nav { flex:1; overflow-y:auto; padding:.5rem 0; }
    .drawer-nav a { display:flex; align-items:center; padding:.9rem 1.5rem; color:#1e293b; text-decoration:none; font-size:.95rem; font-weight:500; transition:background .15s; }
    .drawer-nav a:hover { background:#f1f5f9; }
    .drawer-nav hr { border:none; border-top:1px solid #e2e8f0; margin:.4rem 0; }
    .drawer-footer { padding:1rem 1.5rem; border-top:1px solid #e2e8f0; }
    .logout-btn { width:100%; padding:.75rem; background:#fff; border:1.5px solid #ef4444; color:#ef4444; border-radius:8px; font-weight:600; font-size:.95rem; cursor:pointer; }
    .logout-btn:hover { background:#ef4444; color:#fff; }
  </style>
</head>
<body>
  <div class="side-overlay" id="sideOverlay"></div>
  <div class="side-drawer" id="sideDrawer">
    <div class="drawer-header">
      <span class="logo-text">ShopFlow</span>
      <button class="drawer-close" id="drawerClose">✕</button>
    </div>
    <div class="drawer-user" id="drawerUser" style="display:none" onclick="window.location.href='profile.html'">
      <strong id="drawerName"></strong>
      <span id="drawerEmail"></span>
    </div>
    <nav class="drawer-nav">
      <a href="dashboard.html">My Dashboard</a>
      <a href="profile.html">My Profile</a>
      <a href="purchases.html">Purchases</a>
      <a href="seller.html">Become a Seller</a>
      <hr />
      <a href="about.html">About Us</a>
      <a href="settings.html">Settings</a>
    </nav>
    <div class="drawer-footer">
      <button class="logout-btn" id="logoutBtn" style="display:none">Logout</button>
    </div>
  </div>

  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:.25rem;">
      <button class="side-menu-btn" id="menuBtn">☰</button>
      <a class="logo" href="../index.html">ShopFlow</a>
    </div>
    <div class="nav-links">
      <a href="dashboard.html" style="color:#fff">Dashboard</a>
      <a href="../index.html" id="authLink" style="color:#fff">Shop</a>
    </div>
  </nav>

  <div class="page">
    <a class="back-link" href="dashboard.html">← Back to Dashboard</a>

    <!-- Welcome banner -->
    <div class="welcome">
      <div class="avatar" id="avatarInitial">?</div>
      <div>
        <h1 id="welcomeName">My Profile</h1>
        <p id="welcomeEmail"></p>
        <p id="memberSince" style="opacity:.7;font-size:.8rem;margin-top:.2rem;"></p>
      </div>
    </div>

    <div class="grid2">
      <!-- Personal Info -->
      <div class="card">
        <h2>Personal Information</h2>
        <div class="form-group"><label>Full Name</label><input id="profileName" type="text" /></div>
        <div class="form-group"><label>Email Address</label><input id="profileEmail" type="email" /></div>
        <div class="form-group"><label>Phone Number</label><input id="profilePhone" type="tel" placeholder="+1 (555) 000-0000" /></div>
        <div class="form-group"><label>Date of Birth</label><input id="profileDob" type="date" /></div>
        <button class="btn-save" onclick="saveProfile()">Save Changes</button>
        <p class="msg" id="profileMsg"></p>
      </div>

      <!-- Shipping Address -->
      <div class="card">
        <h2>Default Shipping Address</h2>
        <div class="form-group"><label>Street Address</label><input id="addrStreet" type="text" placeholder="123 Main St" /></div>
        <div class="form-group"><label>Apt / Suite</label><input id="addrApt" type="text" placeholder="Apt 4B (optional)" /></div>
        <div class="form-group"><label>City</label><input id="addrCity" type="text" /></div>
        <div class="form-group"><label>State</label><input id="addrState" type="text" /></div>
        <div class="form-group"><label>ZIP Code</label><input id="addrZip" type="text" /></div>
        <div class="form-group"><label>Country</label>
          <select id="addrCountry">
            <option>United States</option><option>Canada</option><option>United Kingdom</option><option>Australia</option><option>Other</option>
          </select>
        </div>
        <button class="btn-save" onclick="saveAddress()">Save Address</button>
        <p class="msg" id="addrMsg"></p>
      </div>
    </div>

  <script src="../js/api.js"></script>
  <script>
    const stored = localStorage.getItem('sf_user');
    if (!stored) window.location.href = 'login.html';
    const user = JSON.parse(stored);

    // Populate header
    document.getElementById('avatarInitial').textContent = user.name.charAt(0).toUpperCase();
    document.getElementById('welcomeName').textContent   = user.name;
    document.getElementById('welcomeEmail').textContent  = user.email;
    document.getElementById('memberSince').textContent   = 'Member since ' + new Date().toLocaleDateString('en-US',{year:'numeric',month:'long'});
    document.getElementById('authLink').textContent      = user.name.split(' ')[0];

    // Populate fields
    document.getElementById('profileName').value  = user.name  || '';
    document.getElementById('profileEmail').value = user.email || '';
    document.getElementById('profilePhone').value = user.phone || '';

    function saveProfile() {
      user.name  = document.getElementById('profileName').value;
      user.email = document.getElementById('profileEmail').value;
      user.phone = document.getElementById('profilePhone').value;
      localStorage.setItem('sf_user', JSON.stringify(user));
      const msg = document.getElementById('profileMsg');
      msg.style.color = '#22c55e';
      msg.textContent = '✓ Profile updated successfully.';
    }

    function saveAddress() {
      const msg = document.getElementById('addrMsg');
      msg.style.color = '#22c55e';
      msg.textContent = '✓ Address saved.';
    }

    function changePassword() {
      const newPw  = document.getElementById('newPw').value;
      const confPw = document.getElementById('confPw').value;
      const msg    = document.getElementById('pwMsg');
      if (newPw.length < 8) { msg.style.color='#ef4444'; msg.textContent='Password must be at least 8 characters.'; return; }
      if (newPw !== confPw)  { msg.style.color='#ef4444'; msg.textContent='Passwords do not match.'; return; }
      msg.style.color = '#22c55e';
      msg.textContent = '✓ Password updated successfully.';
    }

    // Drawer
    const drawer  = document.getElementById('sideDrawer');
    const overlay = document.getElementById('sideOverlay');
    function openDrawer()  { drawer.classList.add('open'); overlay.classList.add('open'); }
    function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('open'); }
    document.getElementById('menuBtn').addEventListener('click', openDrawer);
    document.getElementById('drawerClose').addEventListener('click', closeDrawer);
    overlay.addEventListener('click', closeDrawer);
    document.getElementById('drawerUser').style.display = 'block';
    document.getElementById('drawerName').textContent  = user.name;
    document.getElementById('drawerEmail').textContent = user.email;
    const lb = document.getElementById('logoutBtn');
    lb.style.display = 'block';
    lb.addEventListener('click', () => {
      localStorage.removeItem('sf_token');
      localStorage.removeItem('sf_user');
      window.location.href = '../index.html';
    });
  </script>
</body>
</html>

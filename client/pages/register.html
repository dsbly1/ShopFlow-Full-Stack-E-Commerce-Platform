<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — ShopFlow</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .auth-box { max-width:420px; margin:4rem auto; background:#fff; padding:2rem; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,.1); }
    .auth-box h2 { margin-bottom:1.5rem; }
    .form-group { margin-bottom:1rem; display:flex; flex-direction:column; gap:.35rem; }
    .form-group label { font-weight:500; font-size:.9rem; }
    .input-wrap { position:relative; display:flex; }
    .input-wrap input { flex:1; padding:.6rem .8rem; padding-right:4rem; border:1px solid #cbd5e1; border-radius:6px; font-size:1rem; outline:none; transition:border .2s; }
    .input-wrap input:focus { border-color:#2563eb; }
    .input-wrap input.valid   { border-color:#22c55e; }
    .input-wrap input.invalid { border-color:#ef4444; }
    .toggle-pw { position:absolute; right:.6rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:.75rem; font-weight:600; color:#2563eb; letter-spacing:.03em; text-transform:uppercase; }
    .toggle-pw:hover { color:#1d4ed8; }
    .hint { font-size:.78rem; margin-top:.25rem; min-height:1rem; }
    .hint.ok  { color:#22c55e; }
    .hint.err { color:#ef4444; }
    .btn-primary { width:100%; padding:.75rem; font-size:1rem; }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .switch { text-align:center; margin-top:1rem; font-size:.9rem; color:#64748b; }
    .switch a { color:#2563eb; }
    #globalError { color:red; font-size:.9rem; margin-bottom:.5rem; min-height:1.2rem; }
    .social-btn { display:flex; align-items:center; justify-content:center; gap:.6rem; width:100%; padding:.7rem; border-radius:8px; font-size:.925rem; font-weight:600; cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#1e293b; margin-bottom:.65rem; transition:background .15s, box-shadow .15s; }
    .social-btn:hover { background:#f8fafc; box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .social-btn img { width:20px; height:20px; }
    .divider { display:flex; align-items:center; gap:.75rem; margin:1.1rem 0; color:#94a3b8; font-size:.82rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#e2e8f0; }
  
    @media (max-width:480px) {
      .auth-box { margin:1.5rem auto; padding:1.25rem; border-radius:8px; }
    }
  </style>
</head>
<body>
  <nav class="navbar"><a class="logo" href="../index.html">ShopFlow</a></nav>
  <div class="auth-box">
    <h2>Create Account</h2>

    <!-- Social login -->
    <button class="social-btn" onclick="socialLogin('google')">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" />
      Continue with Google
    </button>
    <button class="social-btn" onclick="socialLogin('apple')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      Continue with Apple
    </button>
    <button class="social-btn" onclick="socialLogin('facebook')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Continue with Facebook
    </button>

    <div class="divider">or sign up with email</div>

    <div class="form-group">
      <label>Name</label>
      <div class="input-wrap"><input id="name" type="text" placeholder="Your name" /></div>
      <span class="hint" id="nameHint"></span>
    </div>
    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap"><input id="email" type="email" placeholder="you@example.com" /></div>
      <span class="hint" id="emailHint"></span>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input id="password" type="password" placeholder="Min 8 characters" />
        <button class="toggle-pw" type="button" data-target="password">Show</button>
      </div>
      <span class="hint" id="passwordHint"></span>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <input id="confirm" type="password" placeholder="Re-enter password" />
        <button class="toggle-pw" type="button" data-target="confirm">Show</button>
      </div>
      <span class="hint" id="confirmHint"></span>
    </div>
    <p id="globalError"></p>
    <button class="btn-primary" id="registerBtn" disabled>Create Account</button>
    <p class="switch">Already have an account? <a href="login.html">Login</a></p>
  </div>
  <script src="../js/api.js"></script>
  <script>
    const fields = {
      name:     { el: document.getElementById('name'),     hint: document.getElementById('nameHint') },
      email:    { el: document.getElementById('email'),    hint: document.getElementById('emailHint') },
      password: { el: document.getElementById('password'), hint: document.getElementById('passwordHint') },
      confirm:  { el: document.getElementById('confirm'),  hint: document.getElementById('confirmHint') },
    };
    const btn = document.getElementById('registerBtn');
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

    function setField(name, ok, msg) {
      const { el, hint } = fields[name];
      el.classList.remove('valid', 'invalid');
      hint.classList.remove('ok', 'err');
      if (ok === true)  { el.classList.add('valid');  hint.classList.add('ok');  }
      if (ok === false) { el.classList.add('invalid'); hint.classList.add('err'); }
      hint.textContent = msg;
    }

    function validate() {
      let allOk = true;
      if (fields.name.el.value.trim().length < 2) { setField('name', false, 'Enter your full name'); allOk = false; }
      else setField('name', true, '✓ Looks good');

      const emailVal = fields.email.el.value.trim();
      if (!emailVal) { setField('email', null, ''); allOk = false; }
      else if (!emailRe.test(emailVal)) { setField('email', false, 'Enter a valid email address'); allOk = false; }
      else setField('email', true, '✓ Valid email');

      const pw = fields.password.el.value;
      if (!pw) { setField('password', null, ''); allOk = false; }
      else if (pw.length < 8) { setField('password', false, 'At least 8 characters'); allOk = false; }
      else setField('password', true, '✓ Strong enough');

      const conf = fields.confirm.el.value;
      if (!conf) { setField('confirm', null, ''); allOk = false; }
      else if (conf !== pw) { setField('confirm', false, 'Passwords do not match'); allOk = false; }
      else setField('confirm', true, '✓ Passwords match');

      btn.disabled = !allOk;
    }

    Object.values(fields).forEach(f => f.el.addEventListener('input', validate));

    document.querySelectorAll('.toggle-pw').forEach(btn => {
      btn.addEventListener('click', function() {
        const input = document.getElementById(this.dataset.target);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? 'Hide' : 'Show';
      });
    });

    document.getElementById('registerBtn').addEventListener('click', async () => {
      document.getElementById('globalError').textContent = '';
      const res = await api.post('/auth/register', {
        name:     fields.name.el.value.trim(),
        email:    fields.email.el.value.trim(),
        password: fields.password.el.value,
      });
      if (res.token) {
        localStorage.setItem('sf_token', res.token);
        localStorage.setItem('sf_user', JSON.stringify(res.user));
        window.location.href = '/index.html';
      } else {
        document.getElementById('globalError').textContent = res.error || 'Registration failed';
      }
    });

    function socialLogin(provider) {
      const messages = {
        google: 'Google sign-in is coming soon! Please use email registration for now.',
        apple: 'Apple sign-in is coming soon! Please use email registration for now.',
        facebook: 'Facebook sign-in is coming soon! Please use email registration for now.'
      };
      alert(messages[provider]);
    }
  </script>
</body>
</html>

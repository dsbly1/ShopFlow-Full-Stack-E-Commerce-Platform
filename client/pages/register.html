<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — ShopFlow</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .auth-box { max-width:420px; margin:4rem auto; background:#fff; padding:2rem; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,.1); }
    .auth-box h2 { margin-bottom:1.5rem; }
    .form-group { margin-bottom:1rem; display:flex; flex-direction:column; gap:.35rem; }
    .form-group label { font-weight:500; font-size:.9rem; }
    .input-wrap { position:relative; display:flex; }
    .input-wrap input { flex:1; padding:.6rem .8rem; padding-right:4rem; border:1px solid #cbd5e1; border-radius:6px; font-size:1rem; outline:none; transition:border .2s; }
    .input-wrap input:focus { border-color:#2563eb; }
    .input-wrap input.valid   { border-color:#22c55e; }
    .input-wrap input.invalid { border-color:#ef4444; }
    .toggle-pw { position:absolute; right:.6rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:.75rem; font-weight:600; color:#2563eb; letter-spacing:.03em; text-transform:uppercase; }
    .toggle-pw:hover { color:#1d4ed8; }
    .hint { font-size:.78rem; margin-top:.25rem; min-height:1rem; }
    .hint.ok  { color:#22c55e; }
    .hint.err { color:#ef4444; }
    .btn-primary { width:100%; padding:.75rem; font-size:1rem; }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .switch { text-align:center; margin-top:1rem; font-size:.9rem; color:#64748b; }
    .switch a { color:#2563eb; }
    #globalError { color:red; font-size:.9rem; margin-bottom:.5rem; min-height:1.2rem; }
    .social-btn { display:flex; align-items:center; justify-content:center; gap:.6rem; width:100%; padding:.7rem; border-radius:8px; font-size:.925rem; font-weight:600; cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#1e293b; margin-bottom:.65rem; transition:background .15s, box-shadow .15s; }
    .social-btn:hover { background:#f8fafc; box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .social-btn img { width:20px; height:20px; }
    .divider { display:flex; align-items:center; gap:.75rem; margin:1.1rem 0; color:#94a3b8; font-size:.82rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#e2e8f0; }
  
    @keyframes badgePop {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }
    @media (max-width:480px) {
      .auth-box { margin:1.5rem auto; padding:1.25rem; border-radius:8px; }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <div style="position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 8px rgba(0,0,0,.06);">
    <div style="display:flex;align-items:center;gap:1rem;padding:0 1rem;height:64px;max-width:1200px;margin:0 auto;width:100%;overflow:hidden;">
      <button id="hamburger" onclick="toggleDrawer()" style="display:flex;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:.4rem;">
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
      </button>
      <a href="../index.html" style="font-family:Georgia,serif;font-size:clamp(1rem,4vw,1.6rem);font-weight:900;color:#2563eb;text-decoration:none;letter-spacing:-.5px;">ShopFlow</a>

      <div style="display:flex;align-items:center;gap:.75rem;margin-left:auto;">
        <a href="login.html" style="color:#6b7280;font-size:.875rem;font-weight:500;text-decoration:none;padding:.4rem .6rem;border-radius:8px;">Login</a>
        <div style="width:1px;height:24px;background:#e5e7eb;"></div>
        <button onclick="window.location.href='../index.html'" style="position:relative;background:none;border:none;cursor:pointer;color:#6b7280;padding:.4rem;border-radius:8px;display:flex;align-items:center;">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span id="cart-count" style="display:none;position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;font-size:.65rem;font-weight:800;min-width:18px;height:18px;border-radius:999px;align-items:center;justify-content:center;border:2px solid #fff;padding:0 3px;box-shadow:0 2px 6px rgba(239,68,68,.5);">0</span>
        </button>
      </div>
    </div>
  </div>

  <!-- SEARCH BAR -->
  <div style="background:#1d4ed8;padding:.5rem 1rem;">
    <div style="display:flex;align-items:center;gap:.5rem;max-width:1200px;margin:0 auto;">
      <input type="text" id="nav-search-input" placeholder="Search products..." style="flex:1;padding:.5rem .85rem;border-radius:8px;border:none;font-size:.9rem;outline:none;background:#fff;color:#1e293b;"/>
      <button onclick="handleSearch()" style="padding:.5rem 1.1rem;background:#f59e0b;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;white-space:nowrap;">Search</button>
    </div>
  </div>

  <!-- Drawer overlay -->
  <div id="drawer-overlay" onclick="toggleDrawer()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:180;"></div>

  <!-- Side Drawer -->
  <nav id="nav-drawer" style="position:fixed;top:64px;left:0;bottom:0;width:280px;background:#fff;border-right:1px solid #e5e7eb;box-shadow:4px 0 20px rgba(0,0,0,.1);transform:translateX(-100%);transition:transform .3s ease;z-index:190;padding:1.5rem;display:flex;flex-direction:column;gap:.5rem;">
    <a href="../index.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a href="products.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Products</a>
    <a href="about.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>About</a>
    <a href="purchases.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>My Orders</a>
    <a href="profile.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
    <a href="dashboard.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a id="drawer-seller-link" href="my-products.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>My Products</a>
    <a id="drawer-settings-link" href="settings.html" style="display:none;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Settings</a>
    <a href="my-products.html" id="seller-drawer-link" style="display:none;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>My Products</a>
    <div style="height:1px;background:#e5e7eb;margin:.5rem 0;"></div>
    <a href="login.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Login</a>
    <a href="register.html" style="display:block;text-align:center;background:#2563eb;color:#fff;padding:.8rem;border-radius:10px;font-weight:600;text-decoration:none;margin-top:auto;">Create Account</a>
  </nav>
  <div class="auth-box">
    <h2>Create Account</h2>

    <div class="divider">or sign up with email</div>

    <div class="form-group">
      <label>Name</label>
      <div class="input-wrap"><input id="name" type="text" placeholder="Your name" /></div>
      <span class="hint" id="nameHint"></span>
    </div>
    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap"><input id="email" type="email" placeholder="you@example.com" /></div>
      <span class="hint" id="emailHint"></span>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input id="password" type="password" placeholder="Min 8 characters" />
        <button class="toggle-pw" type="button" data-target="password">Show</button>
      </div>
      <span class="hint" id="passwordHint"></span>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <input id="confirm" type="password" placeholder="Re-enter password" />
        <button class="toggle-pw" type="button" data-target="confirm">Show</button>
      </div>
      <span class="hint" id="confirmHint"></span>
    </div>
    <div class="form-group">
      <label>Date of Birth</label>
      <div class="input-wrap"><input id="dob" type="date" /></div>
    </div>
    <div class="form-group">
      <label>City</label>
      <div class="input-wrap"><input id="city" type="text" placeholder="Your city" /></div>
    </div>
    <div class="form-group">
      <label>State</label>
      <div class="input-wrap"><input id="state" type="text" placeholder="e.g. Kansas" /></div>
    </div>
    <p id="globalError"></p>
    <button class="btn-primary" id="registerBtn" disabled>Create Account</button>
    <p class="switch">Already have an account? <a href="login.html">Login</a></p>
  </div>
  <script src="../js/api.js"></script>
  <script>
    const fields = {
      name:     { el: document.getElementById('name'),     hint: document.getElementById('nameHint') },
      email:    { el: document.getElementById('email'),    hint: document.getElementById('emailHint') },
      password: { el: document.getElementById('password'), hint: document.getElementById('passwordHint') },
      confirm:  { el: document.getElementById('confirm'),  hint: document.getElementById('confirmHint') },
    };
    const btn = document.getElementById('registerBtn');
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

    function setField(name, ok, msg) {
      const { el, hint } = fields[name];
      el.classList.remove('valid', 'invalid');
      hint.classList.remove('ok', 'err');
      if (ok === true)  { el.classList.add('valid');  hint.classList.add('ok');  }
      if (ok === false) { el.classList.add('invalid'); hint.classList.add('err'); }
      hint.textContent = msg;
    }

    function validate() {
      let allOk = true;
      if (fields.name.el.value.trim().length < 2) { setField('name', false, 'Enter your full name'); allOk = false; }
      else setField('name', true, '✓ Looks good');

      const emailVal = fields.email.el.value.trim();
      if (!emailVal) { setField('email', null, ''); allOk = false; }
      else if (!emailRe.test(emailVal)) { setField('email', false, 'Enter a valid email address'); allOk = false; }
      else setField('email', true, '✓ Valid email');

      const pw = fields.password.el.value;
      if (!pw) { setField('password', null, ''); allOk = false; }
      else if (pw.length < 8) { setField('password', false, 'At least 8 characters'); allOk = false; }
      else setField('password', true, '✓ Strong enough');

      const conf = fields.confirm.el.value;
      if (!conf) { setField('confirm', null, ''); allOk = false; }
      else if (conf !== pw) { setField('confirm', false, 'Passwords do not match'); allOk = false; }
      else setField('confirm', true, '✓ Passwords match');

      btn.disabled = !allOk;
    }

    Object.values(fields).forEach(f => f.el.addEventListener('input', validate));

    document.querySelectorAll('.toggle-pw').forEach(btn => {
      btn.addEventListener('click', function() {
        const input = document.getElementById(this.dataset.target);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? 'Hide' : 'Show';
      });
    });

    document.getElementById('registerBtn').addEventListener('click', async () => {
      document.getElementById('globalError').textContent = '';
      const res = await api.post('/auth/register', {
        name:     fields.name.el.value.trim(),
        email:    fields.email.el.value.trim(),
        password: fields.password.el.value,
      });
      if (res.token) {
        localStorage.setItem('sf_token', res.token);
        localStorage.setItem('sf_user', JSON.stringify(res.user));
        window.location.href = '/index.html';
      } else {
        document.getElementById('globalError').textContent = res.error || 'Registration failed';
      }
    });

    function socialLogin(provider) {
      const messages = {
        google: 'Google sign-in is coming soon! Please use email registration for now.',
        apple: 'Apple sign-in is coming soon! Please use email registration for now.',
        facebook: 'Facebook sign-in is coming soon! Please use email registration for now.'
      };
      alert(messages[provider]);
    }
  
    function toggleDrawer() {
      const drawer = document.getElementById('nav-drawer');
      const overlay = document.getElementById('drawer-overlay');
      const open = drawer.style.transform === 'translateX(0px)' || drawer.style.transform === 'translateX(0)';
      drawer.style.transform = open ? 'translateX(-100%)' : 'translateX(0)';
      overlay.style.display = open ? 'none' : 'block';
    }
    function handleSearch() {
      const q = document.getElementById('nav-search-input').value.trim();
      if (q) window.location.href = '../index.html?search=' + encodeURIComponent(q);
    }
    document.getElementById('nav-search-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSearch();
    });
    // Cart badge
    (async function() {
      try {
        const sfToken = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
        if (!sfToken) return;
        const res = await fetch('https://shopflow-full-stack-e-commerce-platform.onrender.com/api/cart', {
          headers: { 'Authorization': 'Bearer ' + sfToken }
        });
        if (!res.ok) return;
        const data = await res.json();
        const items = Array.isArray(data) ? data : (data.items || data.cart || []);
        const total = items.reduce(function(sum, item) { return sum + (item.quantity || 1); }, 0);
        const badge = document.getElementById('cart-count');
        if (total > 0) { badge.textContent = total; badge.style.display = 'flex'; }
      } catch(e) {}
    })();
  
    // Show My Products link for sellers
    (function() {
      var user = JSON.parse(localStorage.getItem('sf_user') || '{}');
      if (user.isSeller || user.role === 'seller') {
        var link = document.getElementById('seller-drawer-link');
        if (link) link.style.display = 'flex';
      }
    })();
  
    // Show Settings only when logged in
    (function showSettingsIfLoggedIn() {
      var token = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
      var el = document.getElementById('drawer-settings-link');
      if (token && el) el.style.display = 'flex';
    })();
  </script>
</body>
</html>

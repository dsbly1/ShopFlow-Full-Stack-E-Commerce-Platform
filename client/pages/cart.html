<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — ShopFlow</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .cart-container { max-width:800px; margin:2rem auto; padding:0 1rem; }
    .cart-item { display:flex; gap:1rem; align-items:center; background:#fff; border-radius:10px; padding:1rem; margin-bottom:1rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .cart-item img { width:80px; height:80px; object-fit:cover; border-radius:6px; background:#e2e8f0; }
    .cart-item-info { flex:1; }
    .cart-item-info h3 { font-size:.95rem; }
    .cart-total { text-align:right; font-size:1.3rem; font-weight:700; margin:1.5rem 0; }
  
    @media (max-width:768px) {
      .cart-item { flex-direction:column; align-items:flex-start; }
      .cart-item img { width:100%; height:180px; }
      .cart-total { text-align:left; }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <div style="position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 8px rgba(0,0,0,.06);">
    <div style="display:flex;align-items:center;gap:1rem;padding:0 1rem;height:64px;max-width:1200px;margin:0 auto;width:100%;overflow:hidden;">
      <button id="hamburger" onclick="toggleDrawer()" style="display:flex;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:.4rem;">
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
      </button>
      <a href="../index.html" style="font-family:Georgia,serif;font-size:clamp(1rem,4vw,1.6rem);font-weight:900;color:#2563eb;text-decoration:none;letter-spacing:-.5px;">ShopFlow</a>

      <div style="display:flex;align-items:center;gap:.75rem;margin-left:auto;">
        <div style="width:1px;height:24px;background:#e5e7eb;"></div>
        <button onclick="window.location.href='cart.html'" style="position:relative;background:none;border:none;cursor:pointer;color:#2563eb;padding:.4rem;border-radius:8px;display:flex;align-items:center;">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span id="cart-count" style="display:none;position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;font-size:.65rem;font-weight:800;min-width:18px;height:18px;border-radius:999px;align-items:center;justify-content:center;border:2px solid #fff;padding:0 3px;">0</span>
        </button>
        <button onclick="window.location.href='profile.html'" style="background:none;border:none;cursor:pointer;color:#6b7280;padding:.4rem;border-radius:8px;display:flex;align-items:center;">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <a id="nav-auth-btn" href="register.html" style="background:#2563eb;color:#fff;padding:.45rem .75rem;border-radius:8px;font-size:.8rem;font-weight:600;text-decoration:none;white-space:nowrap;">Get Started</a>
      </div>
    </div>
  </div>

  <!-- SEARCH BAR -->
  <div style="background:#1d4ed8;padding:.5rem 1rem;">
    <div style="display:flex;align-items:center;gap:.5rem;max-width:1200px;margin:0 auto;">
      <input type="text" id="nav-search-input" placeholder="Search products..." style="flex:1;padding:.5rem .85rem;border-radius:8px;border:none;font-size:.9rem;outline:none;background:#fff;color:#1e293b;"/>
      <button onclick="handleSearch()" style="padding:.5rem 1.1rem;background:#f59e0b;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;white-space:nowrap;">Search</button>
    </div>
  </div>

  <!-- Drawer overlay -->
  <div id="drawer-overlay" onclick="toggleDrawer()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:180;"></div>

  <!-- Side Drawer -->
  <nav id="nav-drawer" style="position:fixed;top:64px;left:0;bottom:0;width:280px;background:#fff;border-right:1px solid #e5e7eb;box-shadow:4px 0 20px rgba(0,0,0,.1);transform:translateX(-100%);transition:transform .3s ease;z-index:190;padding:1.5rem;display:flex;flex-direction:column;gap:.5rem;">
    <a href="../index.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a href="products.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Products</a>
    <a href="about.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>About</a>
    <a href="purchases.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/></svg>My Orders</a>
    <a href="profile.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
    <a href="dashboard.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a id="drawer-seller-link" href="my-products.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>Seller's Profile</a>
    <a id="drawer-settings-link" href="settings.html" style="display:none;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Settings</a>
    <a href="my-products.html" id="seller-drawer-link" style="display:none;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>Seller's Profile</a>
    <div style="height:1px;background:#e5e7eb;margin:.5rem 0;"></div>
    <a id="drawer-login-link" href="login.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Login</a>
    <a id="drawer-cta-btn" href="register.html" style="display:block;text-align:center;background:#2563eb;color:#fff;padding:.8rem;border-radius:10px;font-weight:600;text-decoration:none;margin-top:auto;">Create Account</a>
  </nav>
  <div class="cart-container">
    <h2 style="margin-bottom:1.5rem;">Your Cart</h2>
    <div id="cartItems"><p class="loading">Loading cart…</p></div>
    <div class="cart-total" id="cartTotal"></div>
    <button class="btn-primary" id="checkoutBtn" style="display:none;width:100%;padding:.85rem;">Checkout</button>
  </div>
  <script src="../js/api.js"></script>
  <script>
    async function loadCart() {
      const el = document.getElementById('cartItems');

      // Guest cart support
      if (!getToken()) {
        const guestCart = JSON.parse(localStorage.getItem('guest_cart') || '[]');
        if (!guestCart.length) {
          el.innerHTML = '<div style="text-align:center;padding:3rem 1rem;"><div style="font-size:3rem;margin-bottom:1rem;">&#128722;</div><p style="color:#64748b;margin-bottom:1rem;">Your guest cart is empty.</p><a href="../index.html" style="background:#2563eb;color:#fff;padding:.7rem 1.5rem;border-radius:8px;text-decoration:none;font-weight:600;">Browse Products</a></div>';
          var ct = document.getElementById('cartTotal'); if (ct) ct.innerHTML = '';
          return;
        }
        // Fetch product details for each guest cart item
        const productDetails = await Promise.all(
          guestCart.map(i => api.get('/products/' + i.id).catch(() => null))
        );
        let total = 0;
        el.innerHTML = guestCart.map((item, idx) => {
          const p = productDetails[idx];
          if (!p) return '';
          const subtotal = parseFloat(p.price) * (item.quantity || 1);
          total += subtotal;
          return '<div class="cart-item">' +
            '<img src="' + (p.image_url || 'https://placehold.co/80x80/e2e8f0/94a3b8?text=No+Image') + '" alt="' + p.name + '" />' +
            '<div class="cart-item-info"><h3>' + p.name + '</h3>' +
            '<p style="color:#64748b;font-size:.85rem;">Qty: ' + (item.quantity || 1) + '</p>' +
            '<p style="color:#2563eb;font-weight:700;">$' + subtotal.toFixed(2) + '</p></div>' +
            '<button onclick="removeGuestItem(' + item.id + ')" style="background:#fee2e2;color:#dc2626;border:none;border-radius:7px;padding:.4rem .8rem;cursor:pointer;font-size:.8rem;font-weight:600;">Remove</button>' +
            '</div>';
        }).join('');
        document.getElementById('cartTotal').innerHTML =
          '<div style="margin-top:1rem;">Total: $' + total.toFixed(2) + '</div>' +
          '<div style="margin-top:1rem;">' +
          '<button onclick="showDemoMessage()" style="display:block;width:100%;text-align:center;background:#2563eb;color:#fff;padding:.8rem;border-radius:9px;font-weight:600;border:none;cursor:pointer;margin-bottom:.75rem;">Checkout</button>' +
          '<a href="register.html" style="display:block;text-align:center;background:#f8fafc;color:#1e293b;border:1.5px solid #e2e8f0;padding:.8rem;border-radius:9px;font-weight:600;text-decoration:none;">Create Account</a>' +
          '</div>' +
          '<div style="margin-top:.75rem;text-align:center;">' +
          '<button onclick="guestCheckout()" style="background:none;border:none;color:#64748b;font-size:.9rem;cursor:pointer;text-decoration:underline;padding:.4rem;">Continue as Guest</button>' +
          '</div>';
        return;
      }

      const items = await api.get('/cart');
      if (!items.length) { el.innerHTML='<p>Your cart is empty.</p>'; return; }
      el.innerHTML = items.map(i => `
        <div class="cart-item">
          <img src="${i.image_url||''}" alt="${i.name}" />
          <div class="cart-item-info">
            <h3>${i.name}</h3>
            <p>$${parseFloat(i.unit_price||i.price).toFixed(2)} × ${i.quantity}</p>
          </div>
          <strong>$${parseFloat(i.subtotal).toFixed(2)}</strong>
          <button onclick="removeItem(${i.id})" style="border:none;background:none;cursor:pointer;color:#ef4444;font-size:1.2rem;">✕</button>
        </div>
      `).join('');
      const total = items.reduce((s,i) => s + parseFloat(i.subtotal), 0);
      document.getElementById('cartTotal').textContent = `Total: $${total.toFixed(2)}`;
      document.getElementById('checkoutBtn').style.display='block';
    }
    function showDemoMessage() {
      alert(' THIS IS A DEMO! Checkout coming soon...');
    }
    function guestCheckout() {
      sessionStorage.setItem('guest_mode', 'true');
      alert('Guest checkout coming soon! Create an account to complete your purchase.');
    }

    async function removeItem(id) {
      await api.delete(`/cart/${id}`);
      loadCart();
    }
    loadCart();

    function removeGuestItem(productId) {
      let cart = JSON.parse(localStorage.getItem('guest_cart') || '[]');
      cart = cart.filter(i => i.id !== productId);
      localStorage.setItem('guest_cart', JSON.stringify(cart));
      var badge = document.getElementById('cart-count');
      var total = cart.reduce(function(s,i){return s+(i.quantity||1);},0);
      if (badge) { badge.textContent = total; badge.style.display = total > 0 ? 'flex' : 'none'; }
      loadCart();
    }

    function toggleDrawer() {
      var drawer = document.getElementById('nav-drawer');
      var overlay = document.getElementById('drawer-overlay');
      var open = drawer.style.transform === 'translateX(0px)' || drawer.style.transform === 'translateX(0)';
      drawer.style.transform = open ? 'translateX(-100%)' : 'translateX(0)';
      overlay.style.display = open ? 'none' : 'block';
    }
    function handleSearch() {
      var _si = document.getElementById('nav-search-input') || document.getElementById('product-search'); var q = _si ? _si.value.trim() : '';
      if (q) window.location.href = 'products.html?search=' + encodeURIComponent(q);
    }
    var _ski = document.getElementById('nav-search-input') || document.getElementById('product-search'); if (_ski) _ski.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSearch();
    });
    // Auth-aware navbar
    (function() {
      var token = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
      var btn = document.getElementById('nav-auth-btn');
      var drawerLogin = document.getElementById('drawer-login-link');
      var drawerCta = document.getElementById('drawer-cta-btn');
      if (token) {
        btn.textContent = 'Logout'; btn.href = '#';
        btn.style.background = 'transparent'; btn.style.color = '#dc2626'; btn.style.border = '2px solid #dc2626';
        btn.addEventListener('click', function(e) { e.preventDefault(); localStorage.removeItem('sf_token'); localStorage.removeItem('sf_user'); window.location.href = 'login.html'; }, { once: true });
        if (drawerLogin) drawerLogin.style.display = 'none';
        if (drawerCta) {
          drawerCta.textContent = 'Logout';
          drawerCta.removeAttribute('href');
          drawerCta.style.background = '#dc2626';
          drawerCta.style.cursor = 'pointer';
          drawerCta.onclick = function(e) {
            e.preventDefault();
            e.stopPropagation();
            localStorage.removeItem('sf_token');
            localStorage.removeItem('sf_user');
            window.location.href = 'login.html';
          };
        }
      }
    })();
    // Cart badge
    (function() {
      var token = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
      var badge = document.getElementById('cart-count');
      if (token) {
        fetch('https://shopflow-full-stack-e-commerce-platform.onrender.com/api/cart', { headers: { 'Authorization': 'Bearer ' + token } })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            var items = Array.isArray(data) ? data : [];
            var total = items.reduce(function(s, i) { return s + (i.quantity || 1); }, 0);
            if (total > 0) { badge.textContent = total; badge.style.display = 'flex'; }
          }).catch(function() {});
      } else {
        var guest = JSON.parse(localStorage.getItem('guest_cart') || '[]');
        var total = guest.reduce(function(s, i) { return s + (i.quantity || 1); }, 0);
        if (total > 0) { badge.textContent = total; badge.style.display = 'flex'; }
      }
    })();
  
    // Show Seller's Profile link for sellers
    (function() {
      var user = JSON.parse(localStorage.getItem('sf_user') || '{}');
      if (user.isSeller || user.role === 'seller') {
        var link = document.getElementById('seller-drawer-link');
        if (link) link.style.display = 'flex';
      }
    })();
  
    // Show Settings only when logged in
    (function showSettingsIfLoggedIn() {
      var token = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
      var el = document.getElementById('drawer-settings-link');
      if (token && el) el.style.display = 'flex';
    })();
  </script>
</body>
</html>

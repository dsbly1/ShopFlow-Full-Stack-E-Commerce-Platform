<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products - ShopFlow</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { background:#f8fafc; }
    .products-hero { background:linear-gradient(135deg,#1d4ed8,#2563eb); color:#fff; text-align:center; padding:3rem 1rem 2rem; }
    .products-hero h1 { font-size:clamp(1.6rem,4vw,2.4rem); margin-bottom:.5rem; }
    .products-hero p { font-size:1rem; opacity:.85; }
    .products-toolbar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; padding:1.25rem 1.5rem; max-width:1200px; margin:0 auto; }
    .toolbar-right { font-size:.875rem; color:#64748b; }
    .filters-bar { display:flex; gap:.75rem; padding:0 1.5rem 1.25rem; max-width:1200px; margin:0 auto; flex-wrap:wrap; align-items:center; }
    .filters-bar select { padding:.45rem .9rem; border:1.5px solid #e2e8f0; border-radius:8px; background:#fff; font-size:.875rem; cursor:pointer; outline:none; }
    .filters-bar select:focus { border-color:#2563eb; }
    .prod-search { display:flex; align-items:center; background:#fff; border:1.5px solid #e2e8f0; border-radius:8px; overflow:hidden; flex:1; max-width:420px; }
    .prod-search input { flex:1; border:none; padding:.5rem .9rem; font-size:.9rem; outline:none; color:#1e293b; background:transparent; }
    .prod-search button { background:#2563eb; border:none; cursor:pointer; padding:.5rem .85rem; color:#fff; display:flex; align-items:center; }
    @keyframes badgePop { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.3)} 100%{transform:scale(1);opacity:1} }
    @media (max-width:768px) {
      .filters-bar { padding:0 1rem 1rem; gap:.5rem; }
      .filters-bar select { flex:1; min-width:120px; }
      .products-toolbar { padding:1rem; }
    }
    @media (max-width:640px) {
      .products-toolbar { flex-direction:column; align-items:stretch; }
      .prod-search { max-width:100%; width:100%; }
      .prod-search input { width:100%; }
      .filters-bar { flex-direction:column; }
      .filters-bar select { width:100%; }
    }
    @media (max-width:480px) {
      .products-hero { padding:2rem 1rem 1.5rem; }
      .products-hero h1 { font-size:1.4rem; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div style="position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 8px rgba(0,0,0,.06);">
    <div style="display:flex;align-items:center;gap:1rem;padding:0 1.5rem;height:64px;max-width:1200px;margin:0 auto;width:100%;">
      <button id="hamburger" onclick="toggleDrawer()" style="display:flex;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:.4rem;">
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
      </button>
      <a href="../index.html" style="font-family:Georgia,serif;font-size:1.6rem;font-weight:900;color:#2563eb;text-decoration:none;letter-spacing:-.5px;white-space:nowrap;">ShopFlow</a>
      <div style="flex:1;max-width:480px;display:flex;align-items:center;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;overflow:hidden;">
        <input type="text" id="nav-search-input" placeholder="Search products..." style="flex:1;min-width:0;border:none;background:#f9fafb;padding:.55rem .75rem;font-size:.9rem;outline:none;width:100%;color:#111827;"/>
        <button onclick="handleNavSearch()" style="background:#2563eb;border:none;cursor:pointer;padding:.55rem .9rem;color:#fff;display:flex;align-items:center;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;margin-left:auto;">
        <div style="width:1px;height:24px;background:#e5e7eb;"></div>
        <button onclick="window.location.href='cart.html'" style="position:relative;background:none;border:none;cursor:pointer;color:#6b7280;padding:.4rem;border-radius:8px;display:flex;align-items:center;">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span id="cart-count" style="display:none;position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;font-size:.65rem;font-weight:800;min-width:18px;height:18px;border-radius:999px;align-items:center;justify-content:center;border:2px solid #fff;padding:0 3px;animation:badgePop .4s cubic-bezier(.36,2,.6,1) both;box-shadow:0 2px 6px rgba(239,68,68,.5);">0</span>
        </button>
        <button onclick="window.location.href='profile.html'" style="background:none;border:none;cursor:pointer;color:#6b7280;padding:.4rem;border-radius:8px;display:flex;align-items:center;">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <a id="nav-auth-btn" href="register.html" style="background:#2563eb;color:#fff;padding:.5rem 1.2rem;border-radius:8px;font-size:.875rem;font-weight:600;text-decoration:none;white-space:nowrap;">Get Started</a>
      </div>
    </div>
  </div>

  <!-- Drawer overlay -->
  <div id="drawer-overlay" onclick="toggleDrawer()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:180;"></div>

  <!-- Side Drawer -->
  <nav id="nav-drawer" style="position:fixed;top:64px;left:0;bottom:0;width:280px;background:#fff;border-right:1px solid #e5e7eb;box-shadow:4px 0 20px rgba(0,0,0,.1);transform:translateX(-100%);transition:transform .3s ease;z-index:190;padding:1.5rem;display:flex;flex-direction:column;gap:.5rem;">
    <a href="../index.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a href="products.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;background:#eff6ff;color:#2563eb;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Products</a>
    <a href="about.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>About</a>
    <a href="purchases.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/></svg>My Orders</a>
    <a href="profile.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
    <a href="dashboard.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a href="settings.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Settings</a>
    <div style="height:1px;background:#e5e7eb;margin:.5rem 0;"></div>
    <a id="drawer-login-link" href="login.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Login</a>
    <a id="drawer-cta-btn" href="register.html" style="display:block;text-align:center;background:#2563eb;color:#fff;padding:.8rem;border-radius:10px;font-weight:600;text-decoration:none;margin-top:auto;">Create Account</a>
  </nav>

  <!-- HERO -->
  <div class="products-hero">
    <h1>All Products</h1>
    <p>Browse our full inventory - search, filter, and find exactly what you need</p>
  </div>

  <!-- TOOLBAR -->
  <div class="products-toolbar">
    <div class="prod-search">
      <input type="text" id="searchInput" placeholder="Search products..." />
      <button onclick="loadProducts()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
    <div class="toolbar-right" id="productCount"></div>
  </div>

  <!-- FILTERS -->
  <div class="filters-bar">
    <select id="categoryFilter"><option value="">All Categories</option></select>
    <select id="sortFilter">
      <option value="created_at">Newest</option>
      <option value="price_asc">Price: Low to High</option>
      <option value="price_desc">Price: High to Low</option>
      <option value="name">Name A-Z</option>
    </select>
  </div>

  <!-- PRODUCT GRID -->
  <main class="product-grid" id="productGrid" style="max-width:1200px;margin:0 auto;">
    <p class="loading">Loading products...</p>
  </main>

  <footer><p>&copy; <span id="year"></span> ShopFlow. All rights reserved.</p></footer>

  <script src="../js/api.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const PLACEHOLDER = 'https://placehold.co/400x300/e2e8f0/94a3b8?text=No+Image';
    const grid = document.getElementById('productGrid');

    function toggleDrawer() {
      const drawer = document.getElementById('nav-drawer');
      const overlay = document.getElementById('drawer-overlay');
      const open = drawer.style.transform === 'translateX(0px)' || drawer.style.transform === 'translateX(0)';
      drawer.style.transform = open ? 'translateX(-100%)' : 'translateX(0)';
      overlay.style.display = open ? 'none' : 'block';
    }

    function handleNavSearch() {
      const q = document.getElementById('nav-search-input').value.trim();
      if (q) { document.getElementById('searchInput').value = q; loadProducts(); }
    }
    document.getElementById('nav-search-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleNavSearch(); });
    document.getElementById('searchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') loadProducts(); });

    async function loadCategories() {
      const cats = await api.get('/categories');
      if (!Array.isArray(cats)) return;
      const sel = document.getElementById('categoryFilter');
      cats.filter(c => !c.parent_category_id).forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id; opt.textContent = c.name; sel.appendChild(opt);
      });
    }

    async function loadProducts() {
      grid.innerHTML = '<p class="loading">Loading products...</p>';
      const search = document.getElementById('searchInput').value.trim();
      const sort = document.getElementById('sortFilter').value;
      const cat = document.getElementById('categoryFilter').value;
      const q = new URLSearchParams({ search });
      if (sort === 'price_asc') { q.set('sort','price'); q.set('order','asc'); }
      else if (sort === 'price_desc') { q.set('sort','price'); q.set('order','desc'); }
      else q.set('sort', sort);
      if (cat) q.set('category', cat);
      const products = await api.get('/products?' + q);
      const list = Array.isArray(products) ? products : [];
      document.getElementById('productCount').textContent = list.length + ' product' + (list.length !== 1 ? 's' : '') + ' found';
      if (!list.length) {
        grid.innerHTML = search
          ? '<div style="text-align:center;padding:4rem 2rem;grid-column:1/-1;"><div style="font-size:3rem;margin-bottom:1rem;">&#128269;</div><h2 style="font-size:1.2rem;color:#1e293b;margin-bottom:.5rem;">No results for &quot;' + search + '&quot;</h2><p style="color:#64748b;">Try a different keyword or browse all categories.</p><button onclick="document.getElementById('searchInput').value='';loadProducts();" style="margin-top:1.25rem;padding:.65rem 1.5rem;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Clear Search</button></div>'
          : '<p class="loading">No products found.</p>';
        return;
      }
      grid.innerHTML = list.map(p => '<div class="product-card"><img src="' + (p.image_url || PLACEHOLDER) + '" onerror="this.src='' + PLACEHOLDER + ''" alt="' + p.name + '" loading="lazy" /><div class="card-body"><h3>' + p.name + '</h3><div class="card-price">$' + parseFloat(p.price).toFixed(2) + '</div><div class="card-rating">&#11088; ' + (p.avg_rating || 'No reviews') + ' (' + (p.review_count || 0) + ')</div><button class="btn-primary" onclick="addToCart(' + p.id + ')">Add to Cart</button></div></div>').join('');
    }

    async function addToCart(productId) {
      if (!getToken()) { window.location.href = 'login.html'; return; }
      await api.post('/cart', { product_id: productId, quantity: 1 });
      loadCartCount();
      alert('Added to cart!');
    }

    async function loadCartCount() {
      try {
        const sfToken = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
        if (!sfToken) return;
        const res = await fetch('https://shopflow-full-stack-e-commerce-platform.onrender.com/api/cart', { headers: { 'Authorization': 'Bearer ' + sfToken } });
        if (!res.ok) return;
        const data = await res.json();
        const items = Array.isArray(data) ? data : (data.items || data.cart || []);
        const total = items.reduce(function(sum, item) { return sum + (item.quantity || 1); }, 0);
        const badge = document.getElementById('cart-count');
        if (total > 0) { badge.textContent = total; badge.style.display = 'flex'; }
      } catch(e) {}
    }

    (function() {
      const token = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
      const btn = document.getElementById('nav-auth-btn');
      const drawerLogin = document.getElementById('drawer-login-link');
      const drawerCta = document.getElementById('drawer-cta-btn');
      if (token) {
        btn.textContent = 'Logout'; btn.href = '#';
        btn.style.background = 'transparent'; btn.style.color = '#dc2626'; btn.style.border = '2px solid #dc2626';
        btn.addEventListener('click', function(e) { e.preventDefault(); localStorage.removeItem('sf_token'); localStorage.removeItem('sf_user'); window.location.href = 'login.html'; });
        if (drawerLogin) drawerLogin.style.display = 'none';
        if (drawerCta) { drawerCta.textContent = 'Logout'; drawerCta.href = '#'; drawerCta.style.background = '#dc2626'; drawerCta.addEventListener('click', function(e) { e.preventDefault(); localStorage.removeItem('sf_token'); localStorage.removeItem('sf_user'); window.location.href = 'login.html'; }); }
      }
    })();

    (function() {
      const params = new URLSearchParams(window.location.search);
      const q = params.get('search');
      if (q) document.getElementById('searchInput').value = q;
    })();

    document.getElementById('categoryFilter').addEventListener('change', loadProducts);
    document.getElementById('sortFilter').addEventListener('change', loadProducts);
    loadCategories();
    loadProducts();
    loadCartCount();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password — ShopFlow</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { background:#f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,.08); padding:2.5rem; width:100%; max-width:420px; }
    h1 { font-size:1.6rem; color:#1e293b; margin-bottom:.5rem; }
    p { color:#64748b; margin-bottom:1.5rem; font-size:.95rem; }
    label { display:block; font-weight:600; margin-bottom:.4rem; color:#374151; }
    input { width:100%; padding:.75rem 1rem; border:1.5px solid #e2e8f0; border-radius:8px; font-size:1rem; box-sizing:border-box; margin-bottom:1.25rem; }
    button { width:100%; padding:.85rem; background:#2563eb; color:#fff; border:none; border-radius:8px; font-size:1rem; font-weight:700; cursor:pointer; }
    button:hover { background:#1d4ed8; }
    .msg { margin-top:1rem; padding:.85rem; border-radius:8px; text-align:center; font-weight:600; display:none; }
    .msg.success { background:#dcfce7; color:#166534; }
    .msg.error { background:#fee2e2; color:#991b1b; }
    .back { display:block; text-align:center; margin-top:1.25rem; color:#2563eb; text-decoration:none; font-size:.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Forgot Password</h1>
    <p>Enter your email and we'll send you a reset link.</p>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" />
    <button onclick="submitForgot()">Send Reset Link</button>
    <div class="msg" id="msg"></div>
    <a href="login.html" class="back">← Back to Login</a>
  </div>
  <script src="../js/api.js"></script>
  <script>
    async function submitForgot() {
      const email = document.getElementById('email').value.trim();
      const msg = document.getElementById('msg');
      if (!email) { showMsg('Please enter your email.', 'error'); return; }
      const res = await api.post('/auth/forgot-password', { email });
      showMsg(res.message || 'Reset link sent!', 'success');
    }
    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }
  </script>
</body>
</html>

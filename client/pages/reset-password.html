<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password — ShopFlow</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { background:#f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,.08); padding:2.5rem; width:100%; max-width:420px; }
    h1 { font-size:1.6rem; color:#1e293b; margin-bottom:.5rem; }
    p { color:#64748b; margin-bottom:1.5rem; font-size:.95rem; }
    label { display:block; font-weight:600; margin-bottom:.4rem; color:#374151; }
    input { width:100%; padding:.75rem 1rem; border:1.5px solid #e2e8f0; border-radius:8px; font-size:1rem; box-sizing:border-box; margin-bottom:1.25rem; }
    button { width:100%; padding:.85rem; background:#2563eb; color:#fff; border:none; border-radius:8px; font-size:1rem; font-weight:700; cursor:pointer; }
    button:hover { background:#1d4ed8; }
    .msg { margin-top:1rem; padding:.85rem; border-radius:8px; text-align:center; font-weight:600; display:none; }
    .msg.success { background:#dcfce7; color:#166534; }
    .msg.error { background:#fee2e2; color:#991b1b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>
    <p>Enter your new password below.</p>
    <label for="password">New Password</label>
    <input type="password" id="password" placeholder="Min 8 characters" />
    <label for="confirm">Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat password" />
    <button onclick="submitReset()">Reset Password</button>
    <div class="msg" id="msg"></div>
  </div>
  <script src="../js/api.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.querySelector('.card').innerHTML = '<p style="color:#dc2626;text-align:center;font-weight:600;">Invalid or missing reset token.<br><a href="forgot-password.html">Request a new link</a></p>';
    }
    async function submitReset() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }
      if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }
      const res = await api.post('/auth/reset-password', { token, password });
      if (res.error) { showMsg(res.error, 'error'); return; }
      showMsg('Password reset! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = 'login.html', 2000);
    }
    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }
  </script>
</body>
</html>

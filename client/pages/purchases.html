<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Purchases — ShopFlow</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { background:#f1f5f9; }
    .page { max-width:860px; margin:0 auto; padding:2rem 1.5rem 4rem; }
    .page-header { margin-bottom:2rem; }
    .page-header h1 { font-size:1.6rem; margin-bottom:.25rem; }
    .page-header p { color:#64748b; font-size:.9rem; }
    .card { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); padding:1.5rem; margin-bottom:1.5rem; }
    .order-card { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); padding:1.25rem 1.5rem; margin-bottom:1rem; }
    .order-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.75rem; margin-bottom:1rem; padding-bottom:.75rem; border-bottom:1px solid #f1f5f9; }
    .order-id { font-weight:700; font-size:.95rem; }
    .order-date { font-size:.82rem; color:#64748b; }
    .order-total { font-weight:700; font-size:1rem; color:#2563eb; }
    .badge { display:inline-block; padding:.2rem .65rem; border-radius:20px; font-size:.75rem; font-weight:600; }
    .badge.pending   { background:#fef9c3; color:#854d0e; }
    .badge.delivered { background:#dcfce7; color:#166534; }
    .badge.shipped   { background:#dbeafe; color:#1d4ed8; }
    .badge.processing { background:#f3e8ff; color:#6b21a8; }
    .badge.cancelled { background:#fee2e2; color:#991b1b; }
    .order-items { display:flex; flex-direction:column; gap:.5rem; }
    .order-item { display:flex; align-items:center; gap:1rem; font-size:.88rem; }
    .order-item img { width:52px; height:52px; object-fit:cover; border-radius:7px; background:#e2e8f0; flex-shrink:0; }
    .order-item-info { flex:1; }
    .order-item-info strong { display:block; color:#1e293b; }
    .order-item-info span { color:#64748b; font-size:.8rem; }
    .empty-state { text-align:center; padding:4rem 2rem; color:#94a3b8; }
    .empty-state .icon { font-size:3.5rem; margin-bottom:1rem; }
    .empty-state h2 { font-size:1.2rem; color:#64748b; margin-bottom:.5rem; }
    .btn-primary { display:inline-block; padding:.7rem 1.75rem; background:#2563eb; color:#fff; border-radius:8px; font-weight:700; text-decoration:none; margin-top:1rem; }
    .filters { display:flex; gap:.75rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .filter-btn { padding:.45rem 1rem; border-radius:20px; border:1.5px solid #e2e8f0; background:#fff; font-size:.82rem; font-weight:600; cursor:pointer; color:#64748b; transition:all .15s; }
    .filter-btn.active { background:#2563eb; color:#fff; border-color:#2563eb; }
    .back-link { display:inline-flex; align-items:center; gap:.4rem; color:#2563eb; font-size:.9rem; font-weight:500; text-decoration:none; margin-bottom:1.5rem; }
  
    @media (max-width:640px) {
      .page { padding:1rem .75rem 3rem; }
      .order-header { flex-direction:column; align-items:flex-start; }
      .filters { gap:.5rem; }
      .filter-btn { font-size:.78rem; padding:.35rem .75rem; }
      .order-item img { width:44px; height:44px; }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <div class="navbar" style="position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 8px rgba(0,0,0,.06);">
    <div style="display:flex;align-items:center;gap:1rem;padding:0 1.5rem;height:64px;">
      <button onclick="toggleDrawer()" style="display:flex;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:.4rem;" id="hamburger">
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
        <span style="display:block;width:22px;height:2px;background:#111827;border-radius:2px;"></span>
      </button>
      <a href="../index.html" style="font-family:Georgia,serif;font-size:1.6rem;font-weight:900;color:#2563eb;text-decoration:none;letter-spacing:-.5px;white-space:nowrap;">ShopFlow</a>
      <div style="flex:1;max-width:480px;display:flex;align-items:center;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;overflow:hidden;">
        <input type="text" id="nav-search-input" placeholder="Search products…" style="flex:1;border:none;background:transparent;padding:.55rem 1rem;font-size:.9rem;outline:none;"/>
        <button onclick="handleSearch()" style="background:#2563eb;border:none;cursor:pointer;padding:.55rem .9rem;color:#fff;display:flex;align-items:center;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;margin-left:auto;">
        <a href="dashboard.html" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:.875rem;font-weight:500;text-decoration:none;padding:.4rem .6rem;border-radius:8px;">Dashboard</a>
        <div style="width:1px;height:24px;background:#e5e7eb;"></div>
        <button onclick="window.location.href='../index.html'" style="position:relative;background:none;border:none;cursor:pointer;color:#6b7280;padding:.4rem;border-radius:8px;display:flex;align-items:center;">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span id="cart-count" style="display:none;position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;font-size:.65rem;font-weight:800;min-width:18px;height:18px;border-radius:999px;align-items:center;justify-content:center;border:2px solid #fff;padding:0 3px;">0</span>
        </button>
        <button onclick="window.location.href='profile.html'" style="background:none;border:none;cursor:pointer;color:#6b7280;padding:.4rem;border-radius:8px;display:flex;align-items:center;">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <a id="nav-auth-btn" href="register.html" style="background:#2563eb;color:#fff;padding:.5rem 1.2rem;border-radius:8px;font-size:.875rem;font-weight:600;text-decoration:none;white-space:nowrap;">Get Started</a>
      </div>
    </div>
  </div>

  <!-- Drawer overlay -->
  <div id="drawer-overlay" onclick="toggleDrawer()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:180;"></div>

  <!-- Side Drawer -->
  <nav id="nav-drawer" style="position:fixed;top:64px;left:0;bottom:0;width:280px;background:#fff;border-right:1px solid #e5e7eb;box-shadow:4px 0 20px rgba(0,0,0,.1);transform:translateX(-100%);transition:transform .3s ease;z-index:190;padding:1.5rem;display:flex;flex-direction:column;gap:.5rem;">
    <a href="../index.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a href="about.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>About</a>
    <a href="purchases.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;background:#eff6ff;color:#2563eb;text-decoration:none;font-weight:500;">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>My Orders</a>
    <a href="profile.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
    <a href="dashboard.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a href="settings.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Settings</a>
    <div style="height:1px;background:#e5e7eb;margin:.5rem 0;"></div>
    <a id="drawer-login-link" href="login.html" style="display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:10px;color:#111827;text-decoration:none;font-weight:500;">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Login</a>
    <a id="drawer-cta-btn" href="register.html" style="display:block;text-align:center;background:#2563eb;color:#fff;padding:.8rem;border-radius:10px;font-weight:600;text-decoration:none;margin-top:auto;">Create Account</a>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>My Purchases</h1>
      <p>Your complete order history</p>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterOrders('all', this)">All Orders</button>
      <button class="filter-btn" onclick="filterOrders('pending', this)">Pending</button>
      <button class="filter-btn" onclick="filterOrders('shipped', this)">Shipped</button>
      <button class="filter-btn" onclick="filterOrders('delivered', this)">Delivered</button>
      <button class="filter-btn" onclick="filterOrders('cancelled', this)">Cancelled</button>
    </div>

    <div id="ordersList"></div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    const stored = localStorage.getItem('sf_user');
    if (!stored) window.location.href = 'login.html';
    const user = JSON.parse(stored);
    // authLink removed - handled by nav-auth-btn

    let allOrders = [];

    async function loadOrders() {
      const orders = await api.get('/orders');
      allOrders = Array.isArray(orders) ? orders : [];
      renderOrders(allOrders);
    }

    function renderOrders(orders) {
      const el = document.getElementById('ordersList');
      if (!orders.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="icon">📦</div>
            <h2>No orders found</h2>
            <p>You haven't placed any orders yet.</p>
            <a class="btn-primary" href="../index.html">Start Shopping</a>
          </div>`;
        return;
      }
      el.innerHTML = orders.map(o => `
        <div class="order-card" data-status="${o.status}">
          <div class="order-header">
            <div>
              <div class="order-id">Order #${o.id}</div>
              <div class="order-date">${new Date(o.created_at).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}</div>
            </div>
            <div style="display:flex;align-items:center;gap:1rem;">
              <span class="badge ${o.status}">${o.status}</span>
              <span class="order-total">$${parseFloat(o.total_price).toFixed(2)}</span>
            </div>
          </div>
          <div class="order-items">
            ${o.items ? o.items.map(item => `
              <div class="order-item">
                <img src="https://placehold.co/52x52/e2e8f0/94a3b8?text=Item" alt="${item.name}" />
                <div class="order-item-info">
                  <strong>${item.name}</strong>
                  <span>Qty: ${item.quantity}  ·  $${parseFloat(item.unit_price).toFixed(2)} each</span>
                </div>
                <strong>$${(item.quantity * item.unit_price).toFixed(2)}</strong>
              </div>`).join('') : ''}
          </div>
          <div style="margin-top:1rem;padding-top:.75rem;border-top:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;font-size:.82rem;color:#64748b;">
            <span>Shipping to: ${o.shipping_address || 'N/A'}</span>
          </div>
        </div>`).join('');
    }

    function filterOrders(status, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = status === 'all' ? allOrders : allOrders.filter(o => o.status === status);
      renderOrders(filtered);
    }

    loadOrders();
  
    // Drawer
    function toggleDrawer() {
      const drawer = document.getElementById('nav-drawer');
      const overlay = document.getElementById('drawer-overlay');
      const open = drawer.style.transform === 'translateX(0px)' || drawer.style.transform === 'translateX(0)';
      drawer.style.transform = open ? 'translateX(-100%)' : 'translateX(0)';
      overlay.style.display = open ? 'none' : 'block';
    }

    // Search
    function handleSearch() {
      const q = document.getElementById('nav-search-input').value.trim();
      if (q) window.location.href = '../index.html?search=' + encodeURIComponent(q);
    }
    document.getElementById('nav-search-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSearch();
    });

    // Auth-aware navbar
    (function() {
      const token = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
      const navAuthBtn = document.getElementById('nav-auth-btn');
      const drawerLoginLink = document.getElementById('drawer-login-link');
      const drawerCtaBtn = document.getElementById('drawer-cta-btn');
      if (token) {
        navAuthBtn.textContent = 'Logout';
        navAuthBtn.href = '#';
        navAuthBtn.style.background = 'transparent';
        navAuthBtn.style.color = '#dc2626';
        navAuthBtn.style.border = '2px solid #dc2626';
        navAuthBtn.addEventListener('click', function(e) {
          e.preventDefault();
          localStorage.removeItem('sf_token'); localStorage.removeItem('sf_user');
          window.location.href = 'login.html';
        });
        drawerLoginLink.textContent = 'Logout';
        drawerLoginLink.href = '#';
        drawerLoginLink.addEventListener('click', function(e) {
          e.preventDefault();
          localStorage.removeItem('sf_token'); localStorage.removeItem('sf_user');
          window.location.href = 'login.html';
        });
        drawerCtaBtn.textContent = 'Go to Dashboard';
        drawerCtaBtn.href = 'dashboard.html';
      }
    })();

    // Cart badge
    (async function() {
      try {
        const sfToken = localStorage.getItem('sf_token') || sessionStorage.getItem('sf_token');
        if (!sfToken) return;
        const res = await fetch('https://shopflow-full-stack-e-commerce-platform.onrender.com/api/cart', {
          headers: { 'Authorization': 'Bearer ' + sfToken }
        });
        if (!res.ok) return;
        const data = await res.json();
        const items = Array.isArray(data) ? data : (data.items || data.cart || []);
        const total = items.reduce(function(sum, item) { return sum + (item.quantity || 1); }, 0);
        const badge = document.getElementById('cart-count');
        if (total > 0) { badge.textContent = total; badge.style.display = 'flex'; }
      } catch(e) {}
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopFlow — E-Commerce Platform</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* LEFT SIDE MENU */
    .side-menu-btn { background:none; border:none; cursor:pointer; color:#fff; font-size:1.4rem; line-height:1; padding:0 .5rem 0 0; display:flex; align-items:center; }
    .side-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:300; }
    .side-overlay.open { display:block; }
    .side-drawer {
      position:fixed; top:0; left:-280px; width:280px; height:100vh;
      background:#fff; z-index:400; transition:left .25s ease;
      display:flex; flex-direction:column; box-shadow:4px 0 20px rgba(0,0,0,.15);
    }
    .side-drawer.open { left:0; }
    .drawer-header {
      background:var(--clr-primary); color:#fff;
      padding:1.25rem 1.5rem; display:flex; align-items:center; justify-content:space-between;
    }
    .drawer-header .logo-text { font-size:1.3rem; font-weight:700; }
    .drawer-close { background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; line-height:1; }
    .drawer-user { padding:1rem 1.5rem; border-bottom:1px solid #e2e8f0; font-size:.9rem; color:#64748b; }
    .drawer-user strong { display:block; color:#1e293b; font-size:1rem; }
    .drawer-nav { flex:1; overflow-y:auto; padding:.5rem 0; }
    .drawer-nav a {
      display:flex; align-items:center; gap:.85rem;
      padding:.9rem 1.5rem; color:#1e293b; text-decoration:none;
      font-size:.95rem; font-weight:500; transition:background .15s;
    }
    .drawer-nav a:hover { background:#f1f5f9; }
    .drawer-nav .icon { font-size:1.15rem; width:1.5rem; text-align:center; }
    .drawer-nav hr { border:none; border-top:1px solid #e2e8f0; margin:.4rem 0; }
    .drawer-footer { padding:1rem 1.5rem; border-top:1px solid #e2e8f0; }
    .logout-btn {
      width:100%; padding:.75rem; background:#fff; border:1.5px solid #ef4444;
      color:#ef4444; border-radius:8px; font-weight:600; font-size:.95rem;
      cursor:pointer; transition:all .2s; display:none;
    }
    .logout-btn:hover { background:#ef4444; color:#fff; }
  </style>
</head>
<body>

  <!-- SIDE OVERLAY -->
  <div class="side-overlay" id="sideOverlay"></div>

  <!-- SIDE DRAWER -->
  <div class="side-drawer" id="sideDrawer">
    <div class="drawer-header">
      <span class="logo-text">ShopFlow</span>
      <button class="drawer-close" id="drawerClose">✕</button>
    </div>
    <div class="drawer-user" id="drawerUser" style="display:none;cursor:pointer;" onclick="window.location.href='pages/profile.html'">
      <strong id="drawerName"></strong>
      <span id="drawerEmail"></span>
    </div>
    <nav class="drawer-nav">
      <a href="pages/dashboard.html"><span class="icon">🏠</span> My Dashboard</a>
          <a href="pages/purchases.html"><span class="icon">📦</span> Purchases</a>
      <a href="pages/seller.html"><span class="icon">🏪</span> Become a Seller</a>
      <hr />
      <a href="pages/about.html"><span class="icon">ℹ️</span> About Us</a>
      <a href="pages/settings.html"><span class="icon">⚙️</span> Settings</a>
    </nav>
    <div class="drawer-footer">
      <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:.25rem;">
      <button class="side-menu-btn" id="menuBtn" aria-label="Open menu">☰</button>
      <a class="logo" href="index.html">ShopFlow</a>
    </div>
    <div class="nav-search">
      <input id="searchInput" type="text" placeholder="Search products…" />
      <button id="searchBtn">Search</button>
    </div>
    <div class="nav-links">
      <a href="pages/cart.html" id="cartLink" style="color:#fff;text-decoration:none;display:flex;align-items:center;gap:.3rem;">🛒<span id="cartCount" style="display:none;background:#f59e0b;color:#fff;border-radius:50%;width:18px;height:18px;font-size:.7rem;font-weight:700;display:none;align-items:center;justify-content:center;"></span></a>
      <a href="pages/login.html" id="authLink">Login</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>Shop the Best Products</h1>
    <p>Electronics, Clothing, Books &amp; More</p>
    <div class="hero-btns">
      <a href="#products" class="btn-primary">Browse Now</a>
      <a href="pages/register.html" class="btn-secondary">Create Account</a>
    </div>
  </section>

  <!-- FILTERS -->
  <section class="filters" id="products">
    <select id="categoryFilter"><option value="">All Categories</option></select>
    <select id="sortFilter">
      <option value="created_at">Newest</option>
      <option value="price">Price</option>
      <option value="name">Name</option>
    </select>
  </section>

  <!-- PRODUCT GRID -->
  <main class="product-grid" id="productGrid">
    <p class="loading">Loading products…</p>
  </main>

  <footer><p>&copy; 2024 ShopFlow. Built with Node.js + PostgreSQL.</p></footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Drawer open/close
    const drawer   = document.getElementById('sideDrawer');
    const overlay  = document.getElementById('sideOverlay');
    function openDrawer()  { drawer.classList.add('open'); overlay.classList.add('open'); }
    function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('open'); }
    document.getElementById('menuBtn').addEventListener('click', openDrawer);
    document.getElementById('drawerClose').addEventListener('click', closeDrawer);
    overlay.addEventListener('click', closeDrawer);

    // Auth state
    const stored = localStorage.getItem('sf_user');
    const authLink = document.getElementById('authLink');
    const logoutBtn = document.getElementById('logoutBtn');

    if (stored) {
      const u = JSON.parse(stored);
      // Navbar
      authLink.textContent = u.name.split(' ')[0];
      authLink.href = '#';
      // Drawer user info
      document.getElementById('drawerUser').style.display = 'block';
      document.getElementById('drawerName').textContent  = u.name;
      document.getElementById('drawerEmail').textContent = u.email;
      // Show logout
      logoutBtn.style.display = 'block';
    }

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('sf_token');
      localStorage.removeItem('sf_user');
      window.location.href = '/index.html';
    });
  </script>
</body>
</html>
